<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Movie Player</title>
    <style>
        body {
            background-color: #141414;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .custom-player {
            max-width: 750px;
            width: 100%;
            position: relative;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .video-screen {
            width: 100%;
            display: block;
        }

        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 15px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .custom-player:hover .player-controls {
            opacity: 1;
        }

        .progress-bar {
            background: rgba(255,255,255,0.2);
            height: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            border-radius: 3px;
        }

        .progress-filled {
            background: #ff0000;
            height: 100%;
            width: 0%;
            border-radius: 3px;
        }

        .control-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-buttons button {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .volume-slider {
            width: 70px;
            cursor: pointer;
            accent-color: #ff0000;
        }
    </style>
</head>
<body>

    <div class="custom-player" id="myPlayer">
        <!-- මෙතනට මම හැමදාම වැඩ කරන sample වීඩියෝ ලින්ක් එකක් දැම්මා ටෙස්ට් කරන්න -->
        <video class="video-screen" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" crossorigin="anonymous">
        </video>
        
        <div class="player-controls">
            <div class="progress-bar">
                <div class="progress-filled"></div>
            </div>
            
            <div class="control-buttons">
                <div class="left-controls">
                    <button class="play-btn">▶</button>
                    <button class="skip-btn" data-skip="-10">⏪ 10s</button>
                    <button class="skip-btn" data-skip="10">10s ⏩</button>
                    <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="1">
                </div>
                
                <div class="right-controls">
                    <button class="fullscreen-btn">⛶</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const player = document.getElementById('myPlayer');
        const video = player.querySelector('.video-screen');
        const playBtn = player.querySelector('.play-btn');
        const progressBar = player.querySelector('.progress-bar');
        const progressFilled = player.querySelector('.progress-filled');
        const volumeSlider = player.querySelector('.volume-slider');
        const fullscreenBtn = player.querySelector('.fullscreen-btn');
        const skipButtons = player.querySelectorAll('[data-skip]');

        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.textContent = '❚❚';
            } else {
                video.pause();
                playBtn.textContent = '▶';
            }
        }

        function handleProgress() {
            const percent = (video.currentTime / video.duration) * 100;
            progressFilled.style.width = `${percent}%`;
        }

        function scrub(e) {
            const scrubTime = (e.offsetX / progressBar.offsetWidth) * video.duration;
            video.currentTime = scrubTime;
        }

        function skip() {
            video.currentTime += parseFloat(this.dataset.skip);
        }

        // Double Tap
        let lastTap = 0;
        video.addEventListener('touchstart', function (e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                const rect = video.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                if (x > rect.width / 2) {
                    video.currentTime += 10;
                } else {
                    video.currentTime -= 10;
                }
            }
            lastTap = currentTime;
        });

        // Keyboard Shortcuts
        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            else if (e.code === 'ArrowRight') { video.currentTime += 10; }
            else if (e.code === 'ArrowLeft') { video.currentTime -= 10; }
        });

        // Right Click Disable
        player.addEventListener('contextmenu', e => e.preventDefault());

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                player.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        video.addEventListener('click', togglePlay);
        playBtn.addEventListener('click', togglePlay);
        video.addEventListener('timeupdate', handleProgress);
        volumeSlider.addEventListener('input', (e) => video.volume = e.target.value);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        skipButtons.forEach(button => button.addEventListener('click', skip));

        let mousedown = false;
        progressBar.addEventListener('click', scrub);
        progressBar.addEventListener('mousemove', (e) => mousedown && scrub(e));
        progressBar.addEventListener('mousedown', () => mousedown = true);
        progressBar.addEventListener('mouseup', () => mousedown = false);
    </script>
</body>
</html>
