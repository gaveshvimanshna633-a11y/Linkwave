<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050508;
color:white;
text-align:center;
}

header{
padding:20px;
background:#000;
}

.title{
font-size:32px;
font-weight:bold;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.card{
width:220px;
background:#111;
border-radius:12px;
padding:15px;
}

.card img{
width:100%;
border-radius:10px;
}

.join{
display:inline-block;
margin-top:10px;
padding:8px 15px;
background:#3a7bfd;
border-radius:20px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<header>
<h1 class="title">LinkWave</h1>
<a href="submit.html" style="color:#3a7bfd;">Submit Link</a>
</header>

<div class="cards" id="cardsContainer"></div>

<script>

async function loadLinks(){

const container = document.getElementById("cardsContainer")

const res = await fetch("https://raw.githubusercontent.com/gaveshvimanshana25-blip/Gaveshmy/main/links.json")

const links = await res.json()

links.reverse().forEach(link=>{

const card = document.createElement("div")
card.className="card"

card.innerHTML = `

${link.logo ? `<img src="${link.logo}">` : ""}

<h3>${link.name}</h3>

<p>${link.description || ""}</p>

<a class="join" href="${link.url}" target="_blank">Join</a>

`

container.appendChild(card)

})

}

loadLinks()

</script>

</body>
</html>
