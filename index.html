<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Wave - Discover & Share</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#8B5CF6',
                        dark: '#0F172A',
                        darker: '#020617',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'bounce-slight': 'bounceSlight 0.3s ease-in-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        bounceSlight: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.2)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase v10+ -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, increment, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';
        
        window.firebaseApp = { initializeApp, getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, increment, query, orderBy, serverTimestamp, getStorage, ref, uploadBytes, getDownloadURL };
    </script>

    <!-- React Hot Toast -->
    <script src="https://cdn.jsdelivr.net/npm/react-hot-toast@2.4.1/dist/index.umd.production.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .dark .glass-effect {
            background: rgba(15, 23, 42, 0.7);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.3);
        }
        
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .scroll-reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease-out;
        }
        
        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3B82F6;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #2563EB;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-darker text-gray-900 dark:text-white transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const { Toaster, toast } = window['react-hot-toast'];

        // ==========================================
        // FIREBASE CONFIGURATION - REPLACE WITH YOURS
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase (will work once config is updated)
        let app, db, storage;
        let linksCollection;
        
        try {
            if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                const { initializeApp, getFirestore, getStorage, collection } = window.firebaseApp;
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                storage = getStorage(app);
                linksCollection = collection(db, 'links');
            }
        } catch (error) {
            console.log("Firebase not initialized - using demo mode");
        }

        // ==========================================
        // DATA STRUCTURES
        // ==========================================
        const categories = {
            WhatsApp: ['Movie', 'Education', 'Jobs', 'Funny', 'News', 'Business', 'Tech', 'Gaming', 'Group Links', 'Crypto', '18+'],
            Telegram: ['Movies', 'TV Series', 'Channels', 'Bots', 'Crypto', 'Education', 'Software', 'Mod Apps', 'Ebooks', 'Chat Groups'],
            Facebook: ['Pages', 'Groups', 'Marketplace', 'Viral', 'Business', 'Events', 'Gaming', 'Memes', 'News']
        };

        const socialLinks = [
            { name: 'WhatsApp', icon: 'message-circle', color: 'bg-green-500', url: '#' },
            { name: 'Telegram', icon: 'send', color: 'bg-blue-500', url: '#' },
            { name: 'TikTok', icon: 'music', color: 'bg-black dark:bg-gray-800', url: '#' },
            { name: 'Facebook', icon: 'facebook', color: 'bg-blue-600', url: '#' }
        ];

        // ==========================================
        // COMPONENTS
        // ==========================================

        // Header Component
        const Header = ({ darkMode, toggleDarkMode, currentView, setView, menuOpen, setMenuOpen }) => (
            <header className="fixed top-0 w-full z-50 glass-effect border-b border-gray-200 dark:border-gray-800">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-16">
                        <div 
                            className="flex items-center space-x-2 cursor-pointer"
                            onClick={() => setView('home')}
                        >
                            <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                                <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                                </svg>
                            </div>
                            <span className="text-2xl font-bold gradient-text">Link Wave</span>
                        </div>

                        <div className="flex items-center space-x-4">
                            <button 
                                onClick={toggleDarkMode}
                                className="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors"
                            >
                                {darkMode ? <i data-lucide="sun" className="w-5 h-5"></i> : <i data-lucide="moon" className="w-5 h-5"></i>}
                            </button>
                            
                            <button 
                                onClick={() => setMenuOpen(!menuOpen)}
                                className="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors"
                            >
                                <i data-lucide={menuOpen ? "x" : "menu"} className="w-6 h-6"></i>
                            </button>
                        </div>
                    </div>
                </div>

                {/* Mobile Menu */}
                {menuOpen && (
                    <div className="absolute top-16 right-0 w-64 bg-white dark:bg-dark border-l border-gray-200 dark:border-gray-800 shadow-xl animate-fade-in">
                        <nav className="p-4 space-y-2">
                            {['Home', 'Categories', 'Submit Link', 'Developer Details'].map((item) => (
                                <button
                                    key={item}
                                    onClick={() => {
                                        setView(item.toLowerCase().replace(' ', '-'));
                                        setMenuOpen(false);
                                    }}
                                    className={`w-full text-left px-4 py-3 rounded-lg transition-colors ${
                                        currentView === item.toLowerCase().replace(' ', '-') 
                                            ? 'bg-blue-500 text-white' 
                                            : 'hover:bg-gray-100 dark:hover:bg-gray-800'
                                    }`}
                                >
                                    {item}
                                </button>
                            ))}
                        </nav>
                    </div>
                )}
            </header>
        );

        // Hero Section with Typing Effect
        const Hero = () => {
            const [text, setText] = useState('');
            const fullText = "Discover, Share, and Connect with communities across WhatsApp, Telegram, and Facebook. Your gateway to viral content and meaningful connections.";
            
            useEffect(() => {
                let index = 0;
                const timer = setInterval(() => {
                    if (index < fullText.length) {
                        setText(fullText.slice(0, index + 1));
                        index++;
                    } else {
                        clearInterval(timer);
                    }
                }, 30);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="relative overflow-hidden pt-32 pb-20 px-4 sm:px-6 lg:px-8">
                    <div className="absolute inset-0 bg-gradient-to-br from-blue-50 to-purple-50 dark:from-blue-900/20 dark:to-purple-900/20 -z-10"></div>
                    <div className="max-w-4xl mx-auto text-center">
                        <h1 className="text-5xl md:text-7xl font-extrabold mb-6">
                            <span className="gradient-text">Ride the Wave</span>
                            <br />
                            <span className="text-gray-900 dark:text-white">of Connections</span>
                        </h1>
                        <p className="text-xl md:text-2xl text-gray-600 dark:text-gray-300 max-w-3xl mx-auto leading-relaxed typing-cursor min-h-[80px]">
                            {text}
                        </p>
                        
                        <div className="mt-10 flex justify-center space-x-4">
                            {socialLinks.map((social) => (
                                <a
                                    key={social.name}
                                    href={social.url}
                                    className={`${social.color} p-3 rounded-full text-white hover:scale-110 transition-transform shadow-lg`}
                                    title={social.name}
                                >
                                    <i data-lucide={social.icon} className="w-6 h-6"></i>
                                </a>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Link Card Component
        const LinkCard = ({ link, onLike, onClick }) => {
            const [isLiked, setIsLiked] = useState(false);
            const [imageLoaded, setImageLoaded] = useState(false);

            const handleLike = (e) => {
                e.stopPropagation();
                setIsLiked(!isLiked);
                onLike(link.id, !isLiked);
            };

            return (
                <div 
                    className="card-hover bg-white dark:bg-dark rounded-2xl overflow-hidden shadow-lg border border-gray-200 dark:border-gray-800 cursor-pointer group scroll-reveal"
                    onClick={() => onClick(link)}
                >
                    <div className="relative h-48 overflow-hidden bg-gray-200 dark:bg-gray-800">
                        {!imageLoaded && (
                            <div className="absolute inset-0 flex items-center justify-center">
                                <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                            </div>
                        )}
                        <img 
                            src={link.imageUrl || 'https://via.placeholder.com/400x300?text=No+Image'} 
                            alt={link.title}
                            className={`w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 ${imageLoaded ? 'opacity-100' : 'opacity-0'}`}
                            onLoad={() => setImageLoaded(true)}
                        />
                        <div className="absolute top-3 right-3 flex space-x-2">
                            <span className="px-3 py-1 bg-black/50 backdrop-blur-md text-white text-xs rounded-full font-medium">
                                {link.category}
                            </span>
                        </div>
                    </div>
                    
                    <div className="p-5">
                        <div className="flex justify-between items-start mb-2">
                            <h3 className="text-lg font-bold text-gray-900 dark:text-white line-clamp-1">{link.title}</h3>
                        </div>
                        <p className="text-gray-600 dark:text-gray-400 text-sm mb-4 line-clamp-2">{link.description}</p>
                        
                        <div className="flex justify-between items-center pt-4 border-t border-gray-100 dark:border-gray-800">
                            <span className="text-xs text-gray-500 dark:text-gray-500 uppercase tracking-wider font-semibold">
                                {link.subCategory}
                            </span>
                            <button 
                                onClick={handleLike}
                                className={`flex items-center space-x-1 transition-colors ${isLiked ? 'text-red-500' : 'text-gray-400 hover:text-red-500'}`}
                            >
                                <i data-lucide="heart" className={`w-5 h-5 ${isLiked ? 'fill-current animate-bounce-slight' : ''}`}></i>
                                <span className="font-semibold">{link.likes || 0}</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // Submit Form Component
        const SubmitForm = ({ onSubmitSuccess }) => {
            const [formData, setFormData] = useState({
                title: '',
                url: '',
                category: '',
                subCategory: '',
                description: ''
            });
            const [image, setImage] = useState(null);
            const [imagePreview, setImagePreview] = useState(null);
            const [loading, setLoading] = useState(false);
            const [wordCount, setWordCount] = useState(0);

            const handleDescriptionChange = (e) => {
                const text = e.target.value;
                const words = text.trim().split(/\s+/).filter(word => word.length > 0);
                const count = words.length;
                
                if (count <= 60) {
                    setFormData({...formData, description: text});
                    setWordCount(count);
                } else {
                    toast.error('Description limit: 60 words maximum');
                }
            };

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 5 * 1024 * 1024) {
                        toast.error('Image size must be less than 5MB');
                        return;
                    }
                    setImage(file);
                    const reader = new FileReader();
                    reader.onloadend = () => setImagePreview(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                if (!formData.title || !formData.url || !formData.category || !formData.subCategory) {
                    toast.error('Please fill in all required fields');
                    return;
                }

                if (!formData.url.match(/^https?:\/\/.+/)) {
                    toast.error('Please enter a valid URL');
                    return;
                }

                setLoading(true);

                try {
                    let imageUrl = null;

                    // Upload image to Firebase Storage if exists
                    if (image && storage) {
                        const { ref, uploadBytes, getDownloadURL } = window.firebaseApp;
                        const storageRef = ref(storage, `links/${Date.now()}_${image.name}`);
                        await uploadBytes(storageRef, image);
                        imageUrl = await getDownloadURL(storageRef);
                    }

                    // Save to Firestore
                    if (db && linksCollection) {
                        const { addDoc, serverTimestamp } = window.firebaseApp;
                        await addDoc(linksCollection, {
                            ...formData,
                            imageUrl: imageUrl,
                            likes: 0,
                            createdAt: serverTimestamp(),
                            status: 'active'
                        });
                        
                        toast.success('Thank you for submitting your link!');
                        setFormData({ title: '', url: '', category: '', subCategory: '', description: '' });
                        setImage(null);
                        setImagePreview(null);
                        setWordCount(0);
                        onSubmitSuccess();
                    } else {
                        // Demo mode
                        toast.success('Demo mode: Form submitted successfully!');
                        setTimeout(() => onSubmitSuccess(), 1500);
                    }
                } catch (error) {
                    console.error('Error submitting:', error);
                    toast.error('Failed to submit. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-2xl mx-auto px-4 py-12 animate-slide-up">
                    <div className="bg-white dark:bg-dark rounded-2xl shadow-xl border border-gray-200 dark:border-gray-800 p-8">
                        <h2 className="text-3xl font-bold mb-2 gradient-text">Submit a Link</h2>
                        <p className="text-gray-600 dark:text-gray-400 mb-8">Share your community with the world</p>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium mb-2">Title *</label>
                                <input
                                    type="text"
                                    value={formData.title}
                                    onChange={(e) => setFormData({...formData, title: e.target.value})}
                                    className="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-darker border border-gray-300 dark:border-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                                    placeholder="Enter link title"
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium mb-2">URL *</label>
                                <input
                                    type="url"
                                    value={formData.url}
                                    onChange={(e) => setFormData({...formData, url: e.target.value})}
                                    className="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-darker border border-gray-300 dark:border-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                                    placeholder="https://example.com"
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium mb-2">Category *</label>
                                    <select
                                        value={formData.category}
                                        onChange={(e) => setFormData({...formData, category: e.target.value, subCategory: ''})}
                                        className="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-darker border border-gray-300 dark:border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none"
                                    >
                                        <option value="">Select Category</option>
                                        {Object.keys(categories).map(cat => (
                                            <option key={cat} value={cat}>{cat}</option>
                                        ))}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium mb-2">Sub-Category *</label>
                                    <select
                                        value={formData.subCategory}
                                        onChange={(e) => setFormData({...formData, subCategory: e.target.value})}
                                        disabled={!formData.category}
                                        className="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-darker border border-gray-300 dark:border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none disabled:opacity-50"
                                    >
                                        <option value="">Select Sub-Category</option>
                                        {formData.category && categories[formData.category].map(sub => (
                                            <option key={sub} value={sub}>{sub}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium mb-2">
                                    Description <span className={`text-xs ${wordCount > 50 ? 'text-orange-500' : 'text-gray-500'}`}>({wordCount}/60 words)</span>
                                </label>
                                <textarea
                                    value={formData.description}
                                    onChange={handleDescriptionChange}
                                    rows="4"
                                    className="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-darker border border-gray-300 dark:border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none resize-none"
                                    placeholder="Describe your link (max 60 words)"
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium mb-2">Image</label>
                                <div className="border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-lg p-6 text-center hover:border-blue-500 transition-colors relative">
                                    <input
                                        type="file"
                                        accept="image/*"
                                        onChange={handleImageChange}
                                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                    />
                                    {imagePreview ? (
                                        <img src={imagePreview} alt="Preview" className="max-h-48 mx-auto rounded-lg" />
                                    ) : (
                                        <div className="space-y-2">
                                            <i data-lucide="upload-cloud" className="w-12 h-12 mx-auto text-gray-400"></i>
                                            <p className="text-sm text-gray-600 dark:text-gray-400">Click to upload or drag and drop</p>
                                            <p className="text-xs text-gray-500">PNG, JPG up to 5MB</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full py-4 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold rounded-lg hover:shadow-lg transform hover:-translate-y-0.5 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center space-x-2"
                            >
                                {loading ? (
                                    <>
                                        <div className="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                                        <span>Submitting...</span>
                                    </>
                                ) : (
                                    <>
                                        <span>Submit Link</span>
                                        <i data-lucide="arrow-right" className="w-5 h-5"></i>
                                    </>
                                )}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // Detail Modal Component
        const DetailModal = ({ link, onClose }) => {
            if (!link) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div 
                        className="bg-white dark:bg-dark rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl animate-slide-up"
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div className="relative h-64 sm:h-80">
                            <img 
                                src={link.imageUrl || 'https://via.placeholder.com/800x600?text=No+Image'} 
                                alt={link.title}
                                className="w-full h-full object-cover"
                            />
                            <button 
                                onClick={onClose}
                                className="absolute top-4 right-4 p-2 bg-black/50 text-white rounded-full hover:bg-black/70 transition-colors"
                            >
                                <i data-lucide="x" className="w-6 h-6"></i>
                            </button>
                            <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-6">
                                <span className="inline-block px-3 py-1 bg-blue-500 text-white text-sm rounded-full mb-2">
                                    {link.category} • {link.subCategory}
                                </span>
                                <h2 className="text-3xl font-bold text-white">{link.title}</h2>
                            </div>
                        </div>
                        
                        <div className="p-6 sm:p-8">
                            <p className="text-gray-600 dark:text-gray-300 text-lg leading-relaxed mb-8">
                                {link.description || "No description provided."}
                            </p>
                            
                            <div className="flex items-center justify-between pt-6 border-t border-gray-200 dark:border-gray-800">
                                <div className="flex items-center space-x-4 text-gray-500 dark:text-gray-400">
                                    <span className="flex items-center space-x-1">
                                        <i data-lucide="heart" className="w-5 h-5 text-red-500 fill-current"></i>
                                        <span className="font-semibold">{link.likes || 0} likes</span>
                                    </span>
                                </div>
                                
                                <a 
                                    href={link.url}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="px-8 py-3 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold rounded-lg hover:shadow-lg transform hover:-translate-y-0.5 transition-all flex items-center space-x-2"
                                >
                                    <span>Join Now</span>
                                    <i data-lucide="external-link" className="w-5 h-5"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Categories View
        const CategoriesView = ({ onSelectCategory }) => (
            <div className="max-w-7xl mx-auto px-4 py-12 animate-fade-in">
                <h2 className="text-4xl font-bold mb-12 text-center gradient-text">Browse Categories</h2>
                <div className="grid md:grid-cols-3 gap-8">
                    {Object.entries(categories).map(([platform, subs]) => (
                        <div key={platform} className="bg-white dark:bg-dark rounded-2xl shadow-lg border border-gray-200 dark:border-gray-800 overflow-hidden">
                            <div className={`p-6 ${platform === 'WhatsApp' ? 'bg-green-500' : platform === 'Telegram' ? 'bg-blue-500' : 'bg-blue-600'} text-white`}>
                                <h3 className="text-2xl font-bold flex items-center space-x-2">
                                    <i data-lucide={platform === 'WhatsApp' ? 'message-circle' : platform === 'Telegram' ? 'send' : 'facebook'} className="w-6 h-6"></i>
                                    <span>{platform}</span>
                                </h3>
                            </div>
                            <div className="p-4">
                                <div className="flex flex-wrap gap-2">
                                    {subs.map(sub => (
                                        <button
                                            key={sub}
                                            onClick={() => onSelectCategory(platform, sub)}
                                            className="px-3 py-1 text-sm bg-gray-100 dark:bg-gray-800 hover:bg-blue-100 dark:hover:bg-blue-900/30 text-gray-700 dark:text-gray-300 rounded-full transition-colors"
                                        >
                                            {sub}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // Developer Details
        const DeveloperDetails = () => (
            <div className="max-w-4xl mx-auto px-4 py-20 text-center animate-fade-in">
                <div className="w-32 h-32 mx-auto mb-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center shadow-2xl">
                    <i data-lucide="code-2" className="w-16 h-16 text-white"></i>
                </div>
                <h2 className="text-4xl font-bold mb-4">Developer Details</h2>
                <p className="text-xl text-gray-600 dark:text-gray-400 mb-8">
                    Built with ❤️ using React, Firebase, and Tailwind CSS
                </p>
                <div className="grid md:grid-cols-3 gap-6 max-w-3xl mx-auto">
                    {[
                        { label: 'Frontend', value: 'React.js + Tailwind' },
                        { label: 'Backend', value: 'Firebase (Firestore)' },
                        { label: 'Storage', value: 'Firebase Storage' }
                    ].map((item, idx) => (
                        <div key={idx} className="p-6 bg-white dark:bg-dark rounded-xl border border-gray-200 dark:border-gray-800 shadow-lg">
                            <p className="text-sm text-gray-500 dark:text-gray-400 uppercase tracking-wider">{item.label}</p>
                            <p className="text-lg font-semibold mt-1">{item.value}</p>
                        </div>
                    ))}
                </div>
            </div>
        );

        // Main App Component
        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [currentView, setView] = useState('home');
            const [menuOpen, setMenuOpen] = useState(false);
            const [links, setLinks] = useState([]);
            const [selectedLink, setSelectedLink] = useState(null);
            const [filter, setFilter] = useState({ category: null, subCategory: null });
            const [loading, setLoading] = useState(true);

            // Initialize dark mode
            useEffect(() => {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setDarkMode(true);
                    document.documentElement.classList.add('dark');
                }
            }, []);

            // Toggle dark mode
            const toggleDarkMode = () => {
                setDarkMode(!darkMode);
                document.documentElement.classList.toggle('dark');
            };

            // Fetch links from Firebase
            useEffect(() => {
                if (!db || !linksCollection) {
                    // Demo data if Firebase not configured
                    setLinks([
                        {
                            id: '1',
                            title: 'Tech Enthusiasts Hub',
                            url: 'https://example.com',
                            category: 'WhatsApp',
                            subCategory: 'Tech',
                            description: 'Join our community of tech enthusiasts discussing the latest in AI, programming, and gadgets.',
                            imageUrl: 'https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=400',
                            likes: 42
                        },
                        {
                            id: '2',
                            title: 'Movie Buffs Central',
                            url: 'https://example.com',
                            category: 'Telegram',
                            subCategory: 'Movies',
                            description: 'Daily movie recommendations and discussions. From classics to latest blockbusters.',
                            imageUrl: 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400',
                            likes: 128
                        },
                        {
                            id: '3',
                            title: 'Crypto Traders Pro',
                            url: 'https://example.com',
                            category: 'Facebook',
                            subCategory: 'Business',
                            description: 'Professional crypto trading signals and market analysis.',
                            imageUrl: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=400',
                            likes: 89
                        }
                    ]);
                    setLoading(false);
                    return;
                }

                const { onSnapshot, query, orderBy } = window.firebaseApp;
                const q = query(linksCollection, orderBy('createdAt', 'desc'));
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const linksData = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setLinks(linksData);
                    setLoading(false);
                }, (error) => {
                    console.error("Error fetching links:", error);
                    toast.error("Failed to load links");
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            // Handle like
            const handleLike = async (linkId, isLiking) => {
                if (!db) {
                    // Demo mode
                    setLinks(links.map(link => 
                        link.id === linkId 
                            ? { ...link, likes: (link.likes || 0) + (isLiking ? 1 : -1) }
                            : link
                    ));
                    return;
                }

                try {
                    const { doc, updateDoc, increment } = window.firebaseApp;
                    const linkRef = doc(db, 'links', linkId);
                    await updateDoc(linkRef, {
                        likes: increment(isLiking ? 1 : -1)
                    });
                } catch (error) {
                    console.error("Error updating likes:", error);
                    toast.error("Failed to update like");
                }
            };

            // Filter links
            const filteredLinks = links.filter(link => {
                if (filter.category && link.category !== filter.category) return false;
                if (filter.subCategory && link.subCategory !== filter.subCategory) return false;
                return true;
            });

            // Scroll reveal effect
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.scroll-reveal').forEach((el) => observer.observe(el));
                return () => observer.disconnect();
            }, [currentView, filteredLinks]);

            // Re-initialize Lucide icons after render
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            return (
                <div className="min-h-screen bg-gray-50 dark:bg-darker transition-colors duration-300">
                    <Toaster position="top-center" toastOptions={{
                        style: {
                            background: darkMode ? '#1e293b' : '#fff',
                            color: darkMode ? '#fff' : '#000',
                        },
                    }} />
                    
                    <Header 
                        darkMode={darkMode} 
                        toggleDarkMode={toggleDarkMode}
                        currentView={currentView}
                        setView={setView}
                        menuOpen={menuOpen}
                        setMenuOpen={setMenuOpen}
                    />

                    <main className="pt-16">
                        {currentView === 'home' && (
                            <>
                                <Hero />
                                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
                                    {filter.category && (
                                        <div className="mb-6 flex items-center justify-between">
                                            <div className="flex items-center space-x-2">
                                                <span className="text-gray-600 dark:text-gray-400">Filtering by:</span>
                                                <span className="px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-full text-sm font-medium">
                                                    {filter.category} {filter.subCategory && `> ${filter.subCategory}`}
                                                </span>
                                            </div>
                                            <button 
                                                onClick={() => setFilter({ category: null, subCategory: null })}
                                                className="text-sm text-blue-500 hover:text-blue-600 font-medium"
                                            >
                                                Clear Filter
                                            </button>
                                        </div>
                                    )}
                                    
                                    {loading ? (
                                        <div className="flex justify-center py-20">
                                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
                                        </div>
                                    ) : (
                                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {filteredLinks.map((link, index) => (
                                                <div key={link.id} style={{ animationDelay: `${index * 100}ms` }} className="animate-slide-up">
                                                    <LinkCard 
                                                        link={link} 
                                                        onLike={handleLike}
                                                        onClick={setSelectedLink}
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    
                                    {!loading && filteredLinks.length === 0 && (
                                        <div className="text-center py-20">
                                            <i data-lucide="inbox" className="w-16 h-16 mx-auto text-gray-400 mb-4"></i>
                                            <p className="text-gray-500 dark:text-gray-400 text-lg">No links found</p>
                                        </div>
                                    )}
                                </div>
                            </>
                        )}

                        {currentView === 'categories' && (
                            <CategoriesView onSelectCategory={(cat, sub) => {
                                setFilter({ category: cat, subCategory: sub });
                                setView('home');
                            }} />
                        )}

                        {currentView === 'submit-link' && (
                            <SubmitForm onSubmitSuccess={() => setView('home')} />
                        )}

                        {currentView === 'developer-details' && <DeveloperDetails />}
                    </main>

                    {selectedLink && (
                        <DetailModal 
                            link={selectedLink} 
                            onClose={() => setSelectedLink(null)} 
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
    </html>
