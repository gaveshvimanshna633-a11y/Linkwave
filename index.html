<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Caption Generator 🔥</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

input, button{
  padding:12px;
  margin:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#00a8ff;
  color:white;
  cursor:pointer;
}

.card{
  background:#111;
  padding:15px;
  margin:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 AI Caption Generator</h1>

  <input type="text" id="topic" placeholder="Type topic (love, sad, funny)">
  <br>
  <button onclick="generate()">Generate</button>

  <div id="result"></div>
</div>

<script>

const captions = {
  love: [
    "ඔයා නැතිව ජීවිතේ blank වගේ 🥺❤️",
    "Love කියන්නේ feeling එකක් නෙවෙයි... commitment එකක් 💍",
    "ඔයා හිනාවෙද්දි මගේ ලෝකේ full වෙනවා 😍"
  ],
  sad: [
    "හිනාවෙන් හිටියත් ඇතුලෙන් break වෙලා 💔",
    "අපිට හොඳ වෙන්න හිතපු අයම hurt කරනවා 😔",
    "Alone but still breathing 😶"
  ],
  funny: [
    "Diet start කරන දවසටම kottu order 😭😂",
    "Life set වෙන්නෙ නෑ... wifi signal වගේ 🥲",
    "Exam eka kalin mathak wenne book open karaddi 🤣"
  ]
};

function generate(){
  let topic = document.getElementById("topic").value.toLowerCase();
  let result = document.getElementById("result");

  result.innerHTML = "";

  if(captions[topic]){
    captions[topic].forEach(text => {
      result.innerHTML += `
        <div class="card" onclick="copyText(this)">
          ${text}
        </div>
      `;
    });
  } else {
    result.innerHTML = "<p>No captions found 😢</p>";
  }
}

function copyText(el){
  navigator.clipboard.writeText(el.innerText);
  alert("Copied 😎");
}

</script>

</body>
</html>
