<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Wave - Pro Directory</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#8B0000', light: '#DC143C', dark: '#5C0000' }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(135deg, #FF3131 0%, #8B0000 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-shadow { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-shadow:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px rgba(139, 0, 0, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="dark:bg-[#050505] bg-gray-50 transition-colors duration-500 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { motion, AnimatePresence, LayoutGroup } = window.Motion;

        // --- Sidebar Component ---
        const Sidebar = ({ isOpen, onClose, darkMode, activeCategory, setActiveCategory }) => {
            const categories = [
                { id: 'All', icon: 'layout-grid' },
                { id: 'Movie', icon: 'film' },
                { id: 'Study', icon: 'book-open' },
                { id: 'Software', icon: 'cpu' },
                { id: 'Social', icon: 'share-2' },
                { id: 'Other', icon: 'more-horizontal' }
            ];

            return (
                <AnimatePresence>
                    {isOpen && (
                        <>
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={onClose} className="fixed inset-0 bg-black/60 z-40 backdrop-blur-md" />
                            <motion.div initial={{ x: '-100%' }} animate={{ x: 0 }} exit={{ x: '-100%' }} transition={{ type: 'spring', damping: 25, stiffness: 200 }} 
                                className={`fixed left-0 top-0 h-full w-72 z-50 p-6 ${darkMode ? 'bg-[#0A0A0A] border-r border-white/5 text-white' : 'bg-white border-r border-gray-200 text-gray-900 shadow-2xl'}`}>
                                <div className="flex justify-between items-center mb-10">
                                    <div className="flex items-center gap-2">
                                        <div className="w-8 h-8 bg-primary rounded-lg"></div>
                                        <h2 className="text-xl font-bold tracking-tight">MENU</h2>
                                    </div>
                                    <button onClick={onClose} className="p-2 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x"></i></button>
                                </div>
                                <div className="space-y-2">
                                    {categories.map(cat => (
                                        <button key={cat.id} onClick={() => { setActiveCategory(cat.id); onClose(); }} 
                                            className={`w-full flex items-center gap-4 px-4 py-4 rounded-2xl transition-all duration-300 ${activeCategory === cat.id ? 'bg-primary text-white shadow-lg shadow-primary/30' : 'hover:bg-white/5 opacity-70 hover:opacity-100'}`}>
                                            <i data-lucide={cat.icon} className="w-5 h-5"></i>
                                            <span className="font-semibold">{cat.id}</span>
                                        </button>
                                    ))}
                                </div>
                            </motion.div>
                        </>
                    )}
                </AnimatePresence>
            );
        };

        // --- Form Component ---
        const SubmitForm = ({ darkMode, onSubmit, onClose }) => {
            const [formData, setFormData] = useState({ url: '', category: 'Movie', title: '', description: '', customImage: '' });
            
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setFormData(prev => ({ ...prev, customImage: reader.result }));
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-xl" onClick={onClose}>
                    <motion.div initial={{ scale: 0.9, y: 20, opacity: 0 }} animate={{ scale: 1, y: 0, opacity: 1 }} onClick={e => e.stopPropagation()} 
                        className={`w-full max-w-lg p-8 rounded-[2.5rem] shadow-2xl ${darkMode ? 'bg-[#111] text-white border border-white/10' : 'bg-white text-gray-900'}`}>
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-3xl font-extrabold gradient-text">Add Link</h2>
                            <button onClick={onClose} className="p-2 opacity-50 hover:opacity-100"><i data-lucide="x"></i></button>
                        </div>
                        
                        <div className="space-y-5">
                            <div className="space-y-2">
                                <label className="text-sm font-bold opacity-60 ml-1 text-white">URL</label>
                                <input type="url" placeholder="https://..." className="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:ring-2 ring-primary/50 transition-all text-white" 
                                    onChange={e => setFormData({...formData, url: e.target.value})} required />
                            </div>

                            <div className="space-y-2">
                                <label className="text-sm font-bold opacity-60 ml-1 text-white">Image (Optional)</label>
                                <div className="flex gap-3">
                                    <input type="text" placeholder="Paste Image URL" value={formData.customImage.startsWith('data:') ? '' : formData.customImage}
                                        className="flex-1 p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-white text-sm" 
                                        onChange={e => setFormData({...formData, customImage: e.target.value})} />
                                    
                                    <label className="cursor-pointer bg-white/5 p-4 rounded-2xl border border-white/10 hover:bg-primary transition-all">
                                        <i data-lucide="upload" className="w-5 h-5"></i>
                                        <input type="file" className="hidden" accept="image/*" onChange={handleFileUpload} />
                                    </label>
                                </div>
                                {formData.customImage && (
                                    <div className="mt-2 flex items-center gap-3 p-2 bg-white/5 rounded-xl border border-white/5">
                                        <img src={formData.customImage} className="w-10 h-10 rounded-lg object-cover" />
                                        <span className="text-xs opacity-50">Preview attached</span>
                                        <button onClick={() => setFormData({...formData, customImage: ''})} className="ml-auto text-red-500 text-xs font-bold">Remove</button>
                                    </div>
                                )}
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-2">
                                    <label className="text-sm font-bold opacity-60 ml-1 text-white">Title</label>
                                    <input type="text" className="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-white" 
                                        onChange={e => setFormData({...formData, title: e.target.value})} />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-bold opacity-60 ml-1 text-white">Category</label>
                                    <select className="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-white appearance-none" 
                                        onChange={e => setFormData({...formData, category: e.target.value})}>
                                        <option value="Movie" className="bg-gray-900">Movie</option>
                                        <option value="Study" className="bg-gray-900">Study</option>
                                        <option value="Software" className="bg-gray-900">Software</option>
                                        <option value="Social" className="bg-gray-900">Social</option>
                                    </select>
                                </div>
                            </div>

                            <button onClick={() => { if(formData.url) { onSubmit(formData); onClose(); } }} 
                                className="w-full bg-primary text-white py-5 rounded-2xl font-black text-lg hover:bg-primary-light shadow-xl shadow-primary/20 transition-all mt-4 active:scale-95">
                                GENERATE LINK WAVE
                            </button>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const App = () => {
            const [darkMode, setDarkMode] = useState(true);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [formOpen, setFormOpen] = useState(false);
            const [search, setSearch] = useState('');
            const [activeCategory, setActiveCategory] = useState('All');
            const [links, setLinks] = useState(() => JSON.parse(localStorage.getItem('linkwave_pro') || '[]'));

            useEffect(() => {
                localStorage.setItem('linkwave_pro', JSON.stringify(links));
                lucide.createIcons();
            }, [links, darkMode, sidebarOpen, formOpen]);

            const filteredLinks = useMemo(() => {
                return links.filter(link => 
                    (activeCategory === 'All' || link.category === activeCategory) &&
                    (link.title?.toLowerCase().includes(search.toLowerCase()) || link.url.toLowerCase().includes(search.toLowerCase()))
                );
            }, [links, activeCategory, search]);

            return (
                <div className={darkMode ? 'dark' : ''}>
                    <div className="min-h-screen dark:bg-[#050505] bg-gray-50 dark:text-white text-gray-900 transition-colors duration-500">
                        
                        {/* Glass Header */}
                        <header className="sticky top-0 z-30 px-6 py-5 border-b border-white/5 backdrop-blur-xl bg-black/20">
                            <div className="max-w-7xl mx-auto flex justify-between items-center">
                                <div className="flex items-center gap-6">
                                    <button onClick={() => setSidebarOpen(true)} className="p-3 bg-white/5 hover:bg-white/10 rounded-2xl transition-all border border-white/5">
                                        <i data-lucide="menu" className="w-6 h-6"></i>
                                    </button>
                                    <h1 className="text-3xl font-[900] gradient-text tracking-tighter italic">LINKWAVE.</h1>
                                </div>
                                
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setDarkMode(!darkMode)} className="p-3 bg-white/5 hover:bg-white/10 rounded-2xl transition-all border border-white/5">
                                        <i data-lucide={darkMode ? 'sun' : 'moon'} className="w-5 h-5 text-yellow-500"></i>
                                    </button>
                                    <button onClick={() => setFormOpen(true)} 
                                        className="bg-primary hover:bg-primary-light px-6 py-3 rounded-2xl text-white font-bold flex items-center gap-3 shadow-lg shadow-primary/20 transition-all active:scale-90">
                                        <i data-lucide="plus-circle" className="w-5 h-5"></i>
                                        <span className="hidden sm:inline">Add Resource</span>
                                    </button>
                                </div>
                            </div>
                        </header>

                        <Sidebar isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} darkMode={darkMode} activeCategory={activeCategory} setActiveCategory={setActiveCategory} />

                        {/* Search & Tabs Area */}
                        <main className="max-w-7xl mx-auto px-6 py-12">
                            <div className="mb-12 text-center space-y-6">
                                <motion.h2 initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="text-5xl font-black mb-4">Curate Your Digital World</motion.h2>
                                <div className="relative max-w-2xl mx-auto group">
                                    <i data-lucide="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-primary w-6 h-6 group-focus-within:scale-110 transition-transform"></i>
                                    <input type="text" placeholder="Search by name or URL..." 
                                        className="w-full pl-16 pr-6 py-6 rounded-[2rem] bg-white/5 border border-white/10 outline-none focus:ring-4 ring-primary/20 transition-all text-xl" 
                                        onChange={e => setSearch(e.target.value)} />
                                </div>
                                <div className="flex justify-center gap-2 overflow-x-auto no-scrollbar py-4 px-2">
                                    {['All', 'Movie', 'Study', 'Software', 'Social'].map(c => (
                                        <button key={c} onClick={() => setActiveCategory(c)} 
                                            className={`px-8 py-3 rounded-2xl text-sm font-bold transition-all border ${activeCategory === c ? 'bg-primary border-primary text-white shadow-lg shadow-primary/30' : 'bg-white/5 border-white/5 opacity-50 hover:opacity-100 hover:bg-white/10'}`}>
                                            {c}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Animated Grid Container */}
                            <motion.div layout className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                <AnimatePresence mode="popLayout">
                                    {filteredLinks.map(link => (
                                        <motion.div 
                                            layout
                                            initial={{ opacity: 0, scale: 0.8, y: 30 }}
                                            animate={{ opacity: 1, scale: 1, y: 0 }}
                                            exit={{ opacity: 0, scale: 0.5, transition: { duration: 0.2 } }}
                                            key={link.id} 
                                            className="card-shadow group relative rounded-[2.5rem] overflow-hidden border border-white/10 bg-white/5 backdrop-blur-sm"
                                        >
                                            {/* Delete Button */}
                                            <button onClick={() => setLinks(links.filter(l => l.id !== link.id))} 
                                                className="absolute top-4 right-4 z-20 p-2 bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white rounded-xl opacity-0 group-hover:opacity-100 transition-all">
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>

                                            <div className="h-44 relative overflow-hidden bg-white/5">
                                                <img 
                                                    src={link.customImage || `https://www.google.com/s2/favicons?domain=${new URL(link.url).hostname}&sz=128`} 
                                                    className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" 
                                                    onError={(e) => e.target.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=400&q=80'}
                                                />
                                                <div className="absolute bottom-4 left-4 px-3 py-1 bg-primary rounded-lg text-[10px] font-black tracking-widest text-white uppercase">{link.category}</div>
                                            </div>
                                            
                                            <div className="p-6 space-y-4">
                                                <div>
                                                    <h3 className="font-extrabold text-xl truncate leading-tight">{link.title || 'Exploring Link...'}</h3>
                                                    <p className="text-gray-500 text-xs mt-1 truncate font-medium opacity-60 italic">{link.url}</p>
                                                </div>
                                                <a href={link.url} target="_blank" 
                                                    className="flex items-center justify-center gap-3 w-full py-4 bg-white/5 hover:bg-primary rounded-2xl font-black text-sm transition-all border border-white/5 hover:border-primary active:scale-95 group/btn">
                                                    OPEN LINK <i data-lucide="chevron-right" className="w-4 h-4 group-hover/btn:translate-x-1 transition-transform"></i>
                                                </a>
                                            </div>
                                        </motion.div>
                                    ))}
                                </AnimatePresence>
                            </motion.div>

                            {filteredLinks.length === 0 && (
                                <div className="text-center py-20 opacity-30 italic font-medium">No resources found in this category...</div>
                            )}
                        </main>

                        <AnimatePresence>
                            {formOpen && <SubmitForm darkMode={darkMode} onClose={() => setFormOpen(false)} onSubmit={(data) => setLinks([{...data, id: Date.now()}, ...links])} />}
                        </AnimatePresence>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
    </html>
