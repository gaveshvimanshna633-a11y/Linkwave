<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AniDark — Anime Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--surface:#0f0f1a;--card:#14141f;--card2:#1b1b2a;
  --border:rgba(255,255,255,0.07);--accent:#00d4ff;--accent2:#ff6b9d;
  --accent3:#a855f7;--text:#eeeeff;--muted:#6b6b8a;--score:#fbbf24;
  --red:#ff4466;--green:#22d3a0;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--accent3);border-radius:2px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:rgba(8,8,16,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.08em;background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.search-bar{display:flex;align-items:center;background:var(--card2);border:1px solid var(--border);border-radius:40px;padding:0 6px 0 20px;gap:8px;width:380px;transition:border-color 0.2s}
.search-bar:focus-within{border-color:rgba(0,212,255,0.4)}
.search-bar input{background:none;border:none;outline:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:0.88rem;flex:1;padding:10px 0}
.search-bar input::placeholder{color:var(--muted)}
.search-btn{background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;border-radius:30px;padding:7px 18px;color:#fff;font-family:'Outfit',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity 0.2s}
.search-btn:hover{opacity:0.85}
.nav-tag{font-size:0.72rem;color:var(--muted);letter-spacing:0.06em}
.nav-tag span{color:var(--accent2)}

/* HOME */
#page-home{padding-top:64px}
.home-banner{position:relative;min-height:340px;display:flex;align-items:center;overflow:hidden;padding:60px 40px}
.banner-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 100% at 80% 50%,rgba(168,85,247,0.18) 0%,transparent 60%),radial-gradient(ellipse 50% 80% at 10% 50%,rgba(0,212,255,0.10) 0%,transparent 55%),var(--bg)}
.banner-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:50px 50px;mask-image:linear-gradient(180deg,transparent,rgba(0,0,0,0.5) 30%,rgba(0,0,0,0.5) 70%,transparent)}
.banner-content{position:relative;z-index:2;max-width:600px}
.banner-eyebrow{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.banner-eyebrow::before{content:'';width:30px;height:1px;background:var(--accent)}
.banner-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,6vw,5rem);letter-spacing:0.04em;line-height:1;margin-bottom:16px}
.banner-title span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.banner-sub{color:var(--muted);font-size:0.9rem;line-height:1.6;max-width:440px}

/* SECTION */
.section{max-width:1200px;margin:0 auto;padding:40px 40px}
.sec-head{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.06em}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.sec-count{font-size:0.72rem;color:var(--muted);background:var(--card2);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}

/* GRID */
.anime-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.anime-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.28s cubic-bezier(0.34,1.4,0.64,1);position:relative}
.anime-card:hover{transform:translateY(-6px);border-color:rgba(0,212,255,0.3);box-shadow:0 20px 50px rgba(0,0,0,0.6),0 0 0 1px rgba(0,212,255,0.15)}
.anime-card-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;transition:transform 0.4s ease}
.anime-card:hover .anime-card-img{transform:scale(1.06)}
.anime-card-body{padding:12px}
.anime-card-title{font-size:0.82rem;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.anime-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{font-size:0.62rem;padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.badge-ep{background:rgba(0,212,255,0.12);color:var(--accent);border:1px solid rgba(0,212,255,0.2)}
.badge-year{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.badge-score{background:rgba(251,191,36,0.12);color:var(--score);border:1px solid rgba(251,191,36,0.2)}
.card-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(8,8,16,0.95) 100%);display:flex;align-items:flex-end;justify-content:center;padding-bottom:60px;opacity:0;transition:opacity 0.25s}
.anime-card:hover .card-overlay{opacity:1}
.view-btn{background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;border-radius:30px;padding:8px 20px;color:#fff;font-family:'Outfit',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer}

/* LOADING / EMPTY */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:var(--muted);font-size:0.88rem}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:14px;opacity:0.4}
.empty-title{font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:8px}

/* INFO PAGE */
#page-info{display:none;padding-top:64px}
.info-hero{position:relative;min-height:480px;display:flex;align-items:flex-end;overflow:hidden}
.info-backdrop{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(30px) brightness(0.22) saturate(1.5);transform:scale(1.1)}
.info-backdrop-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,8,16,0.3) 0%,var(--bg) 90%)}
.info-hero-inner{position:relative;z-index:2;display:grid;grid-template-columns:240px 1fr;gap:40px;max-width:1100px;margin:0 auto;padding:40px 40px 50px;width:100%}
.info-cover{border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.8),0 0 0 1px rgba(255,255,255,0.08);aspect-ratio:3/4.2}
.info-cover img{width:100%;height:100%;object-fit:cover;display:block}
.info-top{display:flex;flex-direction:column;justify-content:flex-end}
.info-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.info-tag{font-size:0.68rem;padding:4px 12px;border-radius:20px;border:1px solid var(--border);color:var(--muted);background:var(--card)}
.info-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,4rem);letter-spacing:0.03em;line-height:1;margin-bottom:6px}
.info-title-jp{font-size:0.82rem;color:var(--muted);margin-bottom:20px}
.info-stats{display:flex;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.stat-item .stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;color:var(--accent)}
.stat-item .stat-lbl{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted)}
.stat-div{width:1px;background:var(--border);height:36px;align-self:center}
.btn-back{display:inline-flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);border-radius:30px;padding:8px 18px;color:var(--muted);font-size:0.8rem;cursor:pointer;transition:all 0.2s;margin-bottom:24px;font-family:'Outfit',sans-serif}
.btn-back:hover{color:var(--text);border-color:rgba(255,255,255,0.15)}
.btn-back svg{width:14px;height:14px;fill:currentColor}
.info-desc-section{max-width:1100px;margin:0 auto;padding:0 40px 40px}
.synopsis-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px 32px;color:#9090b0;font-size:0.88rem;line-height:1.85;margin-bottom:36px}

/* EP LIST */
.ep-list{display:grid;gap:10px}
.ep-item{background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:20px;padding:16px 20px;cursor:default;transition:all 0.22s}
.ep-item:hover{border-color:rgba(0,212,255,0.25);background:var(--card2)}
.ep-num-box{width:48px;height:48px;border-radius:10px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--accent)}
.ep-info{flex:1}
.ep-title-text{font-weight:500;font-size:0.9rem;margin-bottom:3px}
.ep-time-text{font-size:0.72rem;color:var(--muted)}
.ep-actions{display:flex;gap:8px;flex-shrink:0}
.btn-dl{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:30px;border:none;font-family:'Outfit',sans-serif;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-dl-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff}
.btn-dl-primary:hover{opacity:0.85;transform:scale(1.04)}
.btn-dl svg{width:12px;height:12px;fill:currentColor}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;max-width:520px;width:100%;padding:36px;transform:scale(0.92);transition:transform 0.25s;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:scale(1)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.05em}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:1.1rem;transition:all 0.2s}
.modal-close:hover{color:var(--text)}
.modal-ep-info{background:var(--card2);border-radius:12px;padding:16px 20px;margin-bottom:24px;font-size:0.85rem;color:var(--muted)}
.modal-ep-info strong{color:var(--text);display:block;margin-bottom:4px;font-size:0.95rem}
.dl-links{display:flex;flex-direction:column;gap:10px}
.dl-link-item{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.dl-link-left{flex:1;min-width:0}
.dl-link-quality{font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.dl-link-url{font-size:0.72rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dl-btn{flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;border-radius:20px;padding:7px 16px;color:#fff;font-family:'Outfit',sans-serif;font-size:0.75rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:opacity 0.2s}
.dl-btn:hover{opacity:0.85}
.dl-btn svg{width:11px;height:11px;fill:currentColor}
.modal-loading{text-align:center;padding:40px;color:var(--muted);font-size:0.88rem;display:flex;flex-direction:column;align-items:center;gap:14px}
.modal-error{text-align:center;padding:30px;color:var(--red);font-size:0.88rem;background:rgba(255,68,102,0.06);border-radius:12px}
.modal-raw{background:var(--card2);border-radius:12px;padding:16px;font-size:0.72rem;color:var(--muted);word-break:break-all;max-height:200px;overflow-y:auto;margin-top:12px;font-family:monospace;line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;z-index:300;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:0.82rem;color:var(--text);transform:translateY(20px);opacity:0;transition:all 0.3s;display:flex;align-items:center;gap:10px;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-success{background:var(--green)}.dot-error{background:var(--red)}.dot-info{background:var(--accent)}

@media(max-width:768px){
  nav{padding:0 16px}
  .search-bar{width:180px}
  .home-banner{padding:40px 20px}
  .section{padding:30px 20px}
  .anime-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
  .info-hero-inner{grid-template-columns:1fr;gap:20px}
  .info-cover{max-width:180px;margin:0 auto}
  .info-desc-section{padding:0 20px 30px}
  .modal{padding:20px}
  .ep-item{flex-wrap:wrap;gap:12px}
}
</style>
</head>
<body>

<nav>
  <div class="logo">AniDark</div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search anime..." autocomplete="off"/>
    <button class="search-btn" onclick="doSearch()">Search</button>
  </div>
  <div class="nav-tag">by <span>@darkshanyt1</span></div>
</nav>

<!-- HOME -->
<div id="page-home">
  <div class="home-banner">
    <div class="banner-bg"></div>
    <div class="banner-grid"></div>
    <div class="banner-content">
      <div class="banner-eyebrow">Your Anime Universe</div>
      <h1 class="banner-title">Watch &amp; Download<br/><span>Any Anime</span></h1>
      <p class="banner-sub">Search thousands of anime, explore episodes, and download in any quality — all free.</p>
    </div>
  </div>
  <div class="section">
    <div class="sec-head">
      <h2 class="sec-title" id="resultsTitle">Search Anime</h2>
      <div class="sec-line"></div>
      <div class="sec-count" id="resultsCount" style="display:none"></div>
    </div>
    <div id="animeGrid">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Find your anime</div>
        <p>Type an anime name in the search bar above</p>
      </div>
    </div>
  </div>
</div>

<!-- INFO -->
<div id="page-info">
  <div class="info-hero">
    <div class="info-backdrop" id="infoBackdrop"></div>
    <div class="info-backdrop-overlay"></div>
    <div class="info-hero-inner">
      <div class="info-cover"><img id="infoCover" src="" alt="Cover"/></div>
      <div class="info-top">
        <button class="btn-back" onclick="goHome()">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Back to Search
        </button>
        <div class="info-tags" id="infoTags"></div>
        <h1 class="info-title" id="infoTitle"></h1>
        <p class="info-title-jp" id="infoTitleJp"></p>
        <div class="info-stats" id="infoStats"></div>
      </div>
    </div>
  </div>
  <div class="info-desc-section">
    <div class="synopsis-card" id="infoDesc"></div>
    <div class="sec-head">
      <h2 class="sec-title">Episodes</h2>
      <div class="sec-line"></div>
      <div class="sec-count" id="epCount"></div>
    </div>
    <div class="ep-list" id="epList"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Download Episode</div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-ep-info" id="modalEpInfo"></div>
    <div id="modalBody" class="modal-loading">
      <div class="spinner"></div>Fetching download links…
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-dot dot-info" id="toastDot"></div>
  <span id="toastMsg"></span>
</div>

<script>
const API  = 'https://api-dark-shan-yt.koyeb.app';
const AKEY = '646eae85127d7d99';
let currentAnime = null;

// ── Helpers ──
function decodeHtml(s){
  return String(s||'')
    .replace(/&#(\d+);/g,(_,c)=>String.fromCharCode(+c))
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<')
    .replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#039;/g,"'");
}

function toast(msg, type='info'){
  const el=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastDot').className='toast-dot dot-'+type;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

// ── Pages ──
function goHome(){
  document.getElementById('page-info').style.display='none';
  document.getElementById('page-home').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
function goInfo(){
  document.getElementById('page-home').style.display='none';
  document.getElementById('page-info').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Search ──
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q){toast('Enter an anime name!','error');return;}

  const grid=document.getElementById('animeGrid');
  const countEl=document.getElementById('resultsCount');
  document.getElementById('resultsTitle').textContent=`Results for "${q}"`;
  countEl.style.display='none';
  grid.innerHTML=`<div class="loading"><div class="spinner"></div>Searching…</div>`;

  try{
    const r=await fetch(`${API}/anime/animeheaven-search?q=${encodeURIComponent(q)}&apikey=${AKEY}`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    const list=data.data||data.results||data||[];

    if(!Array.isArray(list)||!list.length){
      grid.innerHTML=`<div class="empty-state"><div class="empty-icon">😔</div><div class="empty-title">No results</div><p>Try a different name</p></div>`;
      return;
    }

    countEl.textContent=`${list.length} found`;
    countEl.style.display='inline-block';
    grid.innerHTML='';
    grid.className='anime-grid';

    list.forEach((anime,i)=>{
      const card=document.createElement('div');
      card.className='anime-card';
      card.style.cssText=`opacity:0;transform:translateY(20px);transition:opacity 0.4s ${i*0.04}s,transform 0.4s ${i*0.04}s`;

      const img=anime.image||anime.img||anime.cover||'';
      const title=decodeHtml(anime.title||anime.name||'Unknown');
      const ep=anime.episodes||anime.ep||'';
      const year=anime.year||anime.aired||'';
      const score=anime.score||'';
      const url=anime.url||anime.link||'';

      card.innerHTML=`
        <img class="anime-card-img" src="${img}" alt="${title}" onerror="this.src='https://placehold.co/200x280/14141f/6b6b8a?text=No+Image'"/>
        <div class="card-overlay"><button class="view-btn">▶ View</button></div>
        <div class="anime-card-body">
          <div class="anime-card-title">${title}</div>
          <div class="anime-card-meta">
            ${ep?`<span class="badge badge-ep">${ep} ep</span>`:''}
            ${year?`<span class="badge badge-year">${year}</span>`:''}
            ${score?`<span class="badge badge-score">★ ${score}</span>`:''}
          </div>
        </div>`;

      card.onclick=()=>loadInfo(url,title,img);
      grid.appendChild(card);
      setTimeout(()=>{card.style.opacity='1';card.style.transform='translateY(0)'},i*40);
    });

  }catch(e){
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Search failed</div><p>${e.message}</p></div>`;
    toast('Search error: '+e.message,'error');
  }
}

// ── Info ──
async function loadInfo(url,fallbackTitle,fallbackImg){
  if(!url){toast('No URL available','error');return;}
  goInfo();

  document.getElementById('infoTitle').textContent=fallbackTitle||'Loading…';
  document.getElementById('infoTitleJp').textContent='';
  document.getElementById('infoTags').innerHTML='';
  document.getElementById('infoStats').innerHTML='';
  document.getElementById('infoDesc').textContent='Loading…';
  document.getElementById('epList').innerHTML=`<div class="loading"><div class="spinner"></div>Loading episodes…</div>`;
  document.getElementById('infoCover').src=fallbackImg||'';
  document.getElementById('infoBackdrop').style.backgroundImage=`url('${fallbackImg||''}')`;

  try{
    const r=await fetch(`${API}/anime/animeheaven-info?url=${encodeURIComponent(url)}&apikey=${AKEY}`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    const info=d.data||d;
    currentAnime=info;

    const title=decodeHtml(info.title||fallbackTitle||'Unknown');
    const titleJp=decodeHtml(info.titleJp||info.titleJpn||'');
    const img=info.image||info.cover||fallbackImg||'';
    const desc=decodeHtml(info.description||info.synopsis||'No description available.');
    const tags=Array.isArray(info.tags||info.genres)?( info.tags||info.genres ):[];
    const eps=info.episodes||'?';
    const year=info.year||'';
    const score=info.score||'';
    const epList=info.episodeList||info.episodes_list||[];

    document.getElementById('infoTitle').textContent=title;
    document.getElementById('infoTitleJp').textContent=titleJp;
    document.getElementById('infoDesc').textContent=desc;
    document.getElementById('infoCover').src=img;
    document.getElementById('infoBackdrop').style.backgroundImage=`url('${img}')`;

    const tagsEl=document.getElementById('infoTags');
    tagsEl.innerHTML='';
    tags.forEach(t=>{const s=document.createElement('span');s.className='info-tag';s.textContent=decodeHtml(t);tagsEl.appendChild(s)});

    document.getElementById('infoStats').innerHTML=`
      ${eps?`<div class="stat-item"><div class="stat-val">${eps}</div><div class="stat-lbl">Episodes</div></div><div class="stat-div"></div>`:''}
      ${year?`<div class="stat-item"><div class="stat-val">${year}</div><div class="stat-lbl">Year</div></div><div class="stat-div"></div>`:''}
      ${score?`<div class="stat-item"><div class="stat-val">${String(score).replace('/10','')}</div><div class="stat-lbl">Score</div></div>`:''}`;

    const epListEl=document.getElementById('epList');
    document.getElementById('epCount').textContent=`${Array.isArray(epList)?epList.length:0} episodes`;

    if(!Array.isArray(epList)||!epList.length){
      epListEl.innerHTML=`<div class="empty-state"><div class="empty-icon">📺</div><div class="empty-title">No episodes found</div></div>`;
      return;
    }

    epListEl.innerHTML='';
    epList.forEach(ep=>{
      const num=ep.episode||ep.ep||'?';
      const key=ep.key||ep.id||'';
      const timeAgo=ep.timeAgo||ep.date||'';
      const item=document.createElement('div');
      item.className='ep-item';
      item.innerHTML=`
        <div class="ep-num-box">${num}</div>
        <div class="ep-info">
          <div class="ep-title-text">Episode ${num}</div>
          <div class="ep-time-text">${timeAgo}</div>
        </div>
        <div class="ep-actions">
          <button class="btn-dl btn-dl-primary" onclick="openDownload(${JSON.stringify(num)},${JSON.stringify(key)},event)">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 19v2h14v-2z"/></svg>
            Download
          </button>
        </div>`;
      epListEl.appendChild(item);
    });

  }catch(e){
    document.getElementById('epList').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load</div><p>${e.message}</p></div>`;
    toast('Failed to load info','error');
  }
}

// ── Download Modal ──
async function openDownload(epNum,key,e){
  e&&e.stopPropagation();
  const animeTitle=currentAnime?decodeHtml(currentAnime.title||'Anime'):'Anime';

  document.getElementById('modalEpInfo').innerHTML=`<strong>${animeTitle} — Episode ${epNum}</strong>Fetching download links…`;
  document.getElementById('modalBody').innerHTML=`<div class="modal-loading"><div class="spinner"></div>Loading…</div>`;
  document.getElementById('modalOverlay').classList.add('open');

  try{
    const r=await fetch(`${API}/anime/animeheaven-download?key=${encodeURIComponent(key)}&apikey=${AKEY}`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d=await r.json();

    document.getElementById('modalEpInfo').innerHTML=`<strong>${animeTitle} — Episode ${epNum}</strong>Choose quality to download`;

    // Try to extract links from various response shapes
    let links=[];
    if(Array.isArray(d.data)) links=d.data;
    else if(Array.isArray(d.downloads)) links=d.downloads;
    else if(Array.isArray(d.links)) links=d.links;
    else if(Array.isArray(d)) links=d;
    else if(typeof d.data==='object'&&d.data!==null){
      // object like {360p: url, 720p: url}
      links=Object.entries(d.data).map(([q,u])=>({quality:q,url:typeof u==='string'?u:u.url||u.link||JSON.stringify(u)}));
    } else if(typeof d==='object'){
      const ignore=['status','owner','message'];
      const entries=Object.entries(d).filter(([k])=>!ignore.includes(k));
      if(entries.length) links=entries.map(([q,u])=>({quality:q,url:typeof u==='string'?u:u.url||u.link||JSON.stringify(u)}));
    }

    if(!links.length){
      document.getElementById('modalBody').innerHTML=`
        <div class="modal-error">No direct download links found.</div>
        <div class="modal-raw">${JSON.stringify(d,null,2)}</div>`;
      return;
    }

    let html=`<div class="dl-links">`;
    links.forEach(lnk=>{
      const quality=lnk.quality||lnk.res||lnk.type||lnk.label||'HD';
      const dlUrl=lnk.url||lnk.link||lnk.src||'#';
      const size=lnk.size||lnk.filesize||'';
      html+=`
        <div class="dl-link-item">
          <div class="dl-link-left">
            <div class="dl-link-quality">${quality}${size?' · '+size:''}</div>
            <div class="dl-link-url">${dlUrl}</div>
          </div>
          <a class="dl-btn" href="${dlUrl}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 19v2h14v-2z"/></svg>
            Download
          </a>
        </div>`;
    });
    html+=`</div>`;
    document.getElementById('modalBody').innerHTML=html;

  }catch(err){
    document.getElementById('modalBody').innerHTML=`<div class="modal-error">Error: ${err.message}</div>`;
    toast('Failed to get links','error');
  }
}

function closeModalBg(e){if(e.target===document.getElementById('modalOverlay'))closeModal()}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
</script>
