<!DOCTYPE html>
<html>
<head>
<title>AI Tools</title>
<style>
body{
  background:#0f0f0f;
  color:white;
  text-align:center;
  font-family:Arial;
  padding:40px;
}
input,button{
  padding:10px;
  margin:10px;
}
.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}
</style>
</head>
<body>

<h1>🤖 AI Caption Generator</h1>

<input type="text" id="keyword" placeholder="Enter topic">
<br>
<button onclick="generate()">Generate</button>

<div id="result" class="card"></div>

<script>
function generate(){

  let key = document.getElementById("keyword").value;

  let captions = [
    `🔥 ${key} එක next level!`,
    `${key} mood today 😎`,
    `No one can stop this ${key}!`,
    `${key} vibes only ✨`,
    `Living my best ${key} life 💯`
  ];

  let random = captions[Math.floor(Math.random()*captions.length)];

  document.getElementById("result").innerHTML = random;
}
</script>

</body>
</html>
