<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Movie Player</title>
    <style>
        /* මූලික සැකසුම් */
        body {
            background-color: #141414;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* ප්ලේයර් එකේ ප්‍රධාන කොටස */
        .custom-player {
            max-width: 800px;
            width: 100%;
            position: relative;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            user-select: none; /* Text select කිරීම වැළැක්වීම (Protection) */
        }

        .video-screen {
            width: 100%;
            display: block;
        }

        /* සබ්ටයිටල් පෙනුම හැඩගැස්වීම */
        video::cue {
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-size: 18px;
            border-radius: 4px;
        }

        /* Controls තීරුව */
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            padding: 20px 15px 15px 15px;
            opacity: 0; /* සාමාන්‍යයෙන් කන්ට්‍රෝල්ස් හැංගිලා තියෙන්නේ */
            transition: opacity 0.3s ease-in-out;
            z-index: 2147483647; /* වෙනත් දේවල් වලට යට නොවීමට */
        }

        /* මවුස් එක හෝ ටච් එක ප්ලේයර් එක උඩට ආවම Controls පෙන්වීම */
        .custom-player:hover .player-controls,
        .custom-player:focus-within .player-controls {
            opacity: 1;
        }

        /* වීඩියෝ ධාවන කාල තීරුව (Progress Bar) */
        .progress-bar {
            background: rgba(255,255,255,0.2);
            height: 6px;
            margin-bottom: 15px;
            cursor: pointer;
            border-radius: 3px;
            position: relative;
            transition: height 0.1s;
        }

        .progress-bar:hover {
            height: 8px; /* මවුස් එක ලං කරද්දී ටිකක් මහත වෙනවා */
        }

        .progress-filled {
            background: #ff0000; /* ඔයාගේ වෙබ් සයිට් එකේ තේමා පාට (රතු) */
            height: 100%;
            width: 0%;
            border-radius: 3px;
        }

        /* බොත්තම් සැකසුම් */
        .control-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .control-buttons button {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
            padding: 5px;
            outline: none;
        }

        .control-buttons button:hover {
            transform: scale(1.15);
        }

        /* Volume තීරුව */
        .volume-slider {
            width: 70px;
            cursor: pointer;
            accent-color: #ff0000; /* Slider එක රතු පාට කිරීමට */
        }
    </style>
</head>
<body>

    <div class="custom-player" id="myPlayer">
        <!-- වීඩියෝ එක (ඔයා දුන්න ලින්ක් එක සහ CORS ආරක්ෂාව සමඟ) -->
        <video class="video-screen" src="https://dhruvmirrorpremium1-a2c47cf17a7f.herokuapp.com/59808/Mortal+Kombat+Ii+%282026%29+720P.mp4?hash=AgADiS" crossorigin="anonymous">
            <!-- සිංහල සබ්ටයිටල් ෆයිල් එකක් තියෙනවා නම් මෙතන src එකට දාන්න -->
            <track kind="subtitles" src="sinhala-subtitles.vtt" srclang="si" label="Sinhala" default>
        </video>
        
        <!-- පාලක පැනලය (Controls) -->
        <div class="player-controls">
            <div class="progress-bar">
                <div class="progress-filled"></div>
            </div>
            
            <div class="control-buttons">
                <div class="left-controls">
                    <button class="play-btn" title="Play/Pause">▶</button>
                    <!-- තත්පර 10ක් පස්සට/ඉස්සරහට බොත්තම් -->
                    <button class="skip-btn" data-skip="-10" title="Rewind 10s">⏪ 10s</button>
                    <button class="skip-btn" data-skip="10" title="Forward 10s">10s ⏩</button>
                    <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="1" title="Volume">
                </div>
                
                <div class="right-controls">
                    <button class="fullscreen-btn" title="Fullscreen">⛶</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const player = document.getElementById('myPlayer');
        const video = player.querySelector('.video-screen');
        const playBtn = player.querySelector('.play-btn');
        const progressBar = player.querySelector('.progress-bar');
        const progressFilled = player.querySelector('.progress-filled');
        const volumeSlider = player.querySelector('.volume-slider');
        const fullscreenBtn = player.querySelector('.fullscreen-btn');
        const skipButtons = player.querySelectorAll('[data-skip]');

        // 1. Play සහ Pause ක්‍රියාවලිය
        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.textContent = '❚❚'; // Pause ලකුණ
            } else {
                video.pause();
                playBtn.textContent = '▶'; // Play ලකුණ
            }
        }

        // 2. Timeline එක (Progress Bar) අප්ඩේට් කිරීම
        function handleProgress() {
            const percent = (video.currentTime / video.duration) * 100;
            progressFilled.style.width = `${percent}%`;
        }

        // Timeline එක ක්ලික් කරලා කැමති තැනකට වීඩියෝ එක ගෙනයෑම
        function scrub(e) {
            const scrubTime = (e.offsetX / progressBar.offsetWidth) * video.duration;
            video.currentTime = scrubTime;
        }

        // 3. බොත්තම් මඟින් තත්පර 10ක් Skip කිරීම
        function skip() {
            video.currentTime += parseFloat(this.dataset.skip);
        }

        // 4. මොබයිල් ෆෝන් සඳහා Double Tap (තත්පර 10ක් ඉස්සරහට/පස්සට)
        let lastTap = 0;
        video.addEventListener('touchstart', function (e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                const rect = video.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                if (x > rect.width / 2) {
                    video.currentTime += 10; // දකුණු පැත්ත double tap කලොත් +10s
                } else {
                    video.currentTime -= 10; // වම් පැත්ත double tap කලොත් -10s
                }
            }
            lastTap = currentTime;
        });

        // 5. පරිගණක සඳහා Keyboard Shortcuts
        window.addEventListener('keydown', function(e) {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'ArrowRight') {
                video.currentTime += 10;
            } else if (e.code === 'ArrowLeft') {
                video.currentTime -= 10;
            } else if (e.code === 'ArrowUp') {
                e.preventDefault();
                video.volume = Math.min(1, video.volume + 0.1);
                volumeSlider.value = video.volume;
            } else if (e.code === 'ArrowDown') {
                e.preventDefault();
                video.volume = Math.max(0, video.volume - 0.1);
                volumeSlider.value = video.volume;
            } else if (e.code === 'KeyF') {
                toggleFullscreen();
            }
        });

        // 6. වීඩියෝ එක හොරකම් කිරීම වැළැක්වීම (Right-Click බ්ලොක් කිරීම)
        player.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // 7. Fullscreen ක්‍රියාකාරීත්වය
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (player.requestFullscreen) {
                    player.requestFullscreen();
                } else if (player.webkitRequestFullscreen) { /* Safari සඳහා */
                    player.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Event Listeners සම්බන්ධ කිරීම
        video.addEventListener('click', togglePlay);
        playBtn.addEventListener('click', togglePlay);
        video.addEventListener('timeupdate', handleProgress);
        volumeSlider.addEventListener('input', (e) => video.volume = e.target.value);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        skipButtons.forEach(button => button.addEventListener('click', skip));

        let mousedown = false;
        progressBar.addEventListener('click', scrub);
        progressBar.addEventListener('mousemove', (e) => mousedown && scrub(e));
        progressBar.addEventListener('mousedown', () => mousedown = true);
        progressBar.addEventListener('mouseup', () => mousedown = false);
    </script>
</body>
</html>
