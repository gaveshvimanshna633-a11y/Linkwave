<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiru ✘ Movie - Netflix Style</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">Hiru ✘ <span>Subz</span></div>
  <div class="menu-btn" id="menuBtn">☰</div>
</header>

<!-- HERO -->
<section class="hero">
  <img src="https://via.placeholder.com/1200x500" alt="Featured Movie">
  <div class="hero-overlay">
    <h2>Featured Movie</h2>
    <p>Watch now with Sinhala Subtitles</p>
    <button>Watch Now</button>
  </div>
</section>

<!-- MOVIE CAROUSELS -->
<section class="movie-section">
  <h3>Trending Now</h3>
  <div class="movie-carousel" id="trendingCarousel"></div>
</section>

<section class="movie-section">
  <h3>New Releases</h3>
  <div class="movie-carousel" id="newCarousel"></div>
</section>

<!-- Admin Modal -->
<div class="admin-panel" id="admin-panel">
  <div class="admin-form">
    <span class="close-admin" id="close-admin">✖</span>
    <h3>Admin Login</h3>
    <input type="password" id="admin-password" placeholder="Enter Admin Password">
    <button id="admin-login">Login</button>
  </div>
</div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
