<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Post App</title>

<style>
body{
background:#0b0b0f;
color:white;
font-family:Arial;
text-align:center;
}

textarea{
width:90%;
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#00ffcc;
cursor:pointer;
}

.post{
background:#111;
margin:15px;
padding:10px;
border-radius:10px;
text-align:left;
}

img{
width:100%;
border-radius:10px;
}

.copy-box{
background:#1a1a1a;
padding:10px;
margin-top:10px;
border-radius:8px;
position:relative;
}

.copy-btn{
position:absolute;
right:10px;
top:10px;
background:#00ffcc;
color:black;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
font-size:12px;
}
</style>
</head>

<body>

<h2>📸 Pro Post App</h2>

<textarea id="text" placeholder="Write your post..."></textarea><br>
<input type="file" id="image"><br>
<button onclick="post()">Post</button>

<div id="feed"></div>

<script>
// Load posts from localStorage
let feed = document.getElementById("feed");
let posts = JSON.parse(localStorage.getItem("posts") || "[]");
posts.forEach(p => addPostToFeed(p.text, p.img));

function post(){
let text = document.getElementById("text").value;
let file = document.getElementById("image").files[0];

if(!text && !file) return alert("Text or image required!");

let reader = new FileReader();

reader.onload = function(){
let img = reader.result;
addPostToFeed(text,img);

// save to localStorage
posts.push({text,img});
localStorage.setItem("posts", JSON.stringify(posts));

document.getElementById("text").value="";
document.getElementById("image").value="";
}

if(file){
reader.readAsDataURL(file);
}else{
addPostToFeed(text,"");
posts.push({text,img:""});
localStorage.setItem("posts", JSON.stringify(posts));
}
}

function addPostToFeed(text,img){
let id = Date.now();
let postHTML = `
<div class="post">
${img ? `<img src="${img}">` : ""}
<div class="copy-box">
<div id="text-${id}">${text}</div>
<button class="copy-btn" onclick="copyText('text-${id}')">COPY</button>
</div>
</div>
`;
feed.innerHTML = postHTML + feed.innerHTML;
}

function copyText(id){
let text = document.getElementById(id).innerText;
navigator.clipboard.writeText(text);
alert("Copied!");
}
</script>

</body>
</html>
