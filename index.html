<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiru ✘ Movie - Netflix Style</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <h1>Hiru ✘ <span>Subz</span></h1>
  </div>
  <div class="menu-btn" id="menuBtn">☰</div>
</header>

<!-- HERO / FEATURED -->
<section class="hero">
  <img src="https://via.placeholder.com/1200x500" alt="Featured Movie">
  <div class="hero-overlay">
    <h2>Featured Movie</h2>
    <p>Watch now with Sinhala Subtitles</p>
    <button>Watch Now</button>
  </div>
</section>

<!-- MOVIE CAROUSELS -->
<section class="movie-section">
  <h3>Trending Now</h3>
  <div class="movie-carousel" id="trendingCarousel">
    <div class="movie-card">
      <img src="https://via.placeholder.com/200x300">
      <p>Movie 1</p>
    </div>
    <div class="movie-card">
      <img src="https://via.placeholder.com/200x300">
      <p>Movie 2</p>
    </div>
    <div class="movie-card">
      <img src="https://via.placeholder.com/200x300">
      <p>Movie 3</p>
    </div>
  </div>
</section>

<section class="movie-section">
  <h3>New Releases</h3>
  <div class="movie-carousel" id="newCarousel">
    <div class="movie-card">
      <img src="https://via.placeholder.com/200x300">
      <p>Movie A</p>
    </div>
    <div class="movie-card">
      <img src="https://via.placeholder.com/200x300">
      <p>Movie B</p>
    </div>
    <div class="movie-card">
      <img src="https://via.placeholder.com/200x300">
      <p>Movie C</p>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
