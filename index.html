<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub PRO</title>
<style>
body{
background:#0b0b0f;
color:white;
font-family:Arial;
margin:0;
}
header{
padding:15px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
}
h1{color:#00ffcc;margin:0;}
input{
padding:8px;
border-radius:8px;
border:none;
width:150px;
}
.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
padding:15px;
}
.card{
background:#111;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;height:220px;object-fit:cover;}
.card-body{padding:10px;}
button{
margin-top:5px;
padding:6px;
border:none;
border-radius:6px;
background:#00ffcc;
cursor:pointer;
width:100%;
}
#playerContainer{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;align-items:center;
flex-direction:column;
z-index:9999;
}
#playerContainer iframe{
width:80%;height:60%;
border:none;border-radius:10px;
}
#closeBtn{
margin-top:10px;padding:8px 12px;background:#00ffcc;color:black;border:none;border-radius:8px;cursor:pointer;
}
</style>
</head>
<body>

<header>
<h1>🎬 MovieHub PRO</h1>
<input type="text" id="search" placeholder="Search..." onkeyup="searchMovie()">
</header>

<div class="container" id="movies"></div>

<!-- Player Modal -->
<div id="playerContainer">
<iframe id="player" src="" allowfullscreen></iframe>
<button id="closeBtn" onclick="closePlayer()">Close</button>
</div>

<script>
let movieList = [
{
title:"Big Buck Bunny",
img:"https://peach.blender.org/wp-content/uploads/title_anouncement.jpg",
watch:"https://www.youtube.com/embed/YE7VzlLtp-4",
download:"https://peach.blender.org/download/"
},
{
title:"Sintel",
img:"https://download.blender.org/durian/trailer/sintel_trailer-480p.jpg",
watch:"https://www.youtube.com/embed/eRsGyueVLvQ",
download:"https://durian.blender.org/download/"
},
{
title:"Tears of Steel",
img:"https://mango.blender.org/wp-content/uploads/2013/09/hero.jpg",
watch:"https://www.youtube.com/embed/R6MlUcmOul8",
download:"https://mango.blender.org/download/"
}
];

function loadMovies(list){
let container = document.getElementById("movies");
container.innerHTML = "";
list.forEach(movie=>{
container.innerHTML += `
<div class="card">
<img src="${movie.img}">
<div class="card-body">
<h4>${movie.title}</h4>
<button onclick="openPlayer('${movie.watch}')">▶ Watch</button>
<button onclick="window.open('${movie.download}')">⬇ Download</button>
</div>
</div>
`;
});
}

function searchMovie(){
let value = document.getElementById("search").value.toLowerCase();
let filtered = movieList.filter(m => m.title.toLowerCase().includes(value));
loadMovies(filtered);
}

function openPlayer(url){
let player = document.getElementById("player");
let container = document.getElementById("playerContainer");
player.src = url;
container.style.display="flex";
}

function closePlayer(){
let player = document.getElementById("player");
let container = document.getElementById("playerContainer");
player.src="";
container.style.display="none";
}

loadMovies(movieList);
</script>

</body>
</html>
