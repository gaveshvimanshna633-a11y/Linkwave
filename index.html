<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game 🎮</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  color:white;
  text-align:center;
  font-family:Arial;
}

h1{
  margin-top:20px;
}

#score{
  font-size:24px;
  margin:10px;
}

#gameArea{
  position:relative;
  width:100%;
  height:400px;
  background:#111;
  overflow:hidden;
}

.circle{
  width:60px;
  height:60px;
  background:#ff4757;
  border-radius:50%;
  position:absolute;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎮 Tap Game</h1>
<div id="score">Score: 0</div>

<div id="gameArea"></div>

<script>
let score = 0;
let gameArea = document.getElementById("gameArea");

function spawnCircle(){
  let circle = document.createElement("div");
  circle.classList.add("circle");

  let x = Math.random() * (window.innerWidth - 60);
  let y = Math.random() * 340;

  circle.style.left = x + "px";
  circle.style.top = y + "px";

  circle.onclick = function(){
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    circle.remove();
  }

  gameArea.appendChild(circle);

  setTimeout(()=>{
    circle.remove();
  }, 1000);
}

setInterval(spawnCircle, 800);
</script>

</body>
</html>
