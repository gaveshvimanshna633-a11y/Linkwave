<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINZZON - Movie Hub</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">🔥 CINZZON</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <h3 onclick="toggleDropdown('genreList')">Genre ▼</h3>
  <div id="genreList" class="dropdown">
    <p onclick="filterGenre('Action')">Action</p>
    <p onclick="filterGenre('Crime')">Crime</p>
    <p onclick="filterGenre('Romantic')">Romantic</p>
    <p onclick="filterGenre('Horror')">Horror</p>
    <p onclick="filterGenre('Fantasy')">Fantasy</p>
    <p onclick="filterGenre('18+')">18+</p>
  </div>

  <h3 onclick="toggleDropdown('yearList')">Year ▼</h3>
  <div id="yearList" class="dropdown"></div>

  <h3 onclick="location.href='movies.html'">Movies</h3>
  <h3 onclick="location.href='tv.html'">TV Series</h3>
  <h3 onclick="location.href='developer.html'">Developer</h3>
</div>

<!-- SEARCH BAR -->
<input type="text" id="search" placeholder="🔍 Search movies..." onkeyup="searchMovies()">

<!-- BANNER SLIDER -->
<div class="slider">
  <div class="slides">
    <img src="https://via.placeholder.com/900x300">
    <img src="https://via.placeholder.com/900x300/ff0000">
    <img src="https://via.placeholder.com/900x300/000000">
  </div>
</div>

<!-- GENRE SCROLL -->
<div class="genre-scroll">
  <span onclick="filterGenre('Action')">Action</span>
  <span onclick="filterGenre('Crime')">Crime</span>
  <span onclick="filterGenre('Romantic')">Romantic</span>
  <span onclick="filterGenre('Horror')">Horror</span>
  <span onclick="filterGenre('Fantasy')">Fantasy</span>
  <span onclick="filterGenre('18+')">18+</span>
</div>

<!-- MOVIE GRID -->
<div id="movieList" class="movies"></div>

<!-- WHATSAPP BUTTON -->
<a href="https://wa.me/947XXXXXXXX" class="whatsapp">💬</a>

<!-- SCRIPTS -->
<script src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
