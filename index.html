<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Wave - Directory</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#8B0000',
                            light: '#A52A2A',
                            dark: '#5C0000'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.3s; }
        .gradient-text { background: linear-gradient(135deg, #8B0000 0%, #DC143C 50%, #8B0000 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .wave-animation { background: linear-gradient(90deg, transparent, rgba(139, 0, 0, 0.1), transparent); background-size: 200% 100%; animation: wave 2s infinite; }
        @keyframes wave { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(139, 0, 0, 0.2); }
        .thumbnail-placeholder { background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); }
    </style>
</head>
<body className="dark:bg-gray-950 bg-gray-50">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Custom hook for localStorage
        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });
            const setValue = (value) => {
                try {
                    setStoredValue(value);
                    window.localStorage.setItem(key, JSON.stringify(value));
                } catch (error) { console.error(error); }
            };
            return [storedValue, setValue];
        };

        // Header Component
        const Header = ({ darkMode, setDarkMode, onMenuClick }) => (
            <header className={`sticky top-0 z-30 ${darkMode ? 'bg-gray-900/95 border-gray-800 text-white' : 'bg-white/95 border-gray-200 text-gray-900'} border-b backdrop-blur-sm px-4 py-3`}>
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                    <div className="flex items-center gap-3">
                        <button onClick={onMenuClick} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg">
                            <i data-lucide="menu"></i>
                        </button>
                        <span className="text-xl font-bold gradient-text">Link Wave</span>
                    </div>
                    <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
                        <i data-lucide={darkMode ? 'sun' : 'moon'}></i>
                    </button>
                </div>
            </header>
        );

        // Submit Form Component (Updated with Image Upload)
        const SubmitForm = ({ darkMode, onSubmit, onClose }) => {
            const [url, setUrl] = useState('');
            const [category, setCategory] = useState('Movie');
            const [title, setTitle] = useState('');
            const [description, setDescription] = useState('');
            const [customImage, setCustomImage] = useState(''); // Stores URL or Base64
            const [loading, setLoading] = useState(false);

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setCustomImage(reader.result); // Sets Base64 string
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!url) return;
                setLoading(true);
                await onSubmit({ url, category, title, description, customImage });
                setLoading(false);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={onClose}>
                    <div className={`w-full max-w-lg ${darkMode ? 'bg-gray-900 text-white border-gray-800' : 'bg-white text-gray-900'} p-6 rounded-2xl shadow-2xl overflow-y-auto max-h-[90vh]`} onClick={e => e.stopPropagation()}>
                        <h2 className="text-2xl font-bold mb-4 gradient-text text-center">Submit New Link</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium mb-1">Link URL *</label>
                                <input type="url" value={url} onChange={e => setUrl(e.target.value)} className={`w-full p-2 rounded-lg border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-gray-50 border-gray-200'}`} required />
                            </div>
                            
                            <div>
                                <label className="block text-sm font-medium mb-1">Custom Image (URL or Choose Photo)</label>
                                <input type="text" placeholder="Paste image URL here" value={customImage.startsWith('data:') ? '' : customImage} onChange={e => setCustomImage(e.target.value)} className={`w-full p-2 rounded-lg border mb-2 ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-gray-50 border-gray-200'}`} />
                                <div className="flex items-center gap-2">
                                    <label className="cursor-pointer bg-primary/10 text-primary px-4 py-2 rounded-lg hover:bg-primary/20 text-sm flex items-center gap-2">
                                        <i data-lucide="image" className="w-4 h-4"></i>
                                        Choose Photo
                                        <input type="file" className="hidden" accept="image/*" onChange={handleFileChange} />
                                    </label>
                                    {customImage && (
                                        <div className="w-10 h-10 border rounded overflow-hidden">
                                            <img src={customImage} className="w-full h-full object-cover" />
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium mb-1">Title</label>
                                <input type="text" value={title} onChange={e => setTitle(e.target.value)} className={`w-full p-2 rounded-lg border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-gray-50 border-gray-200'}`} />
                            </div>

                            <button type="submit" disabled={loading} className="w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-primary-dark transition-all">
                                {loading ? 'Saving...' : 'Add Link'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // Link Card Component (Updated Thumbnail Logic)
        const LinkCard = ({ link, darkMode }) => {
            const getThumbnail = () => {
                if (link.customImage) return link.customImage;
                try {
                    const domain = new URL(link.url).hostname;
                    return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
                } catch { return null; }
            };

            return (
                <div className={`card-hover rounded-xl overflow-hidden border ${darkMode ? 'bg-gray-800 border-gray-700 text-white' : 'bg-white border-gray-200 text-gray-900 shadow-sm'}`}>
                    <div className="h-32 bg-gray-200 flex items-center justify-center relative">
                        <img src={getThumbnail()} className="w-full h-full object-cover" onError={(e) => e.target.src='https://via.placeholder.com/150'} />
                        <span className="absolute top-2 right-2 bg-primary text-white text-[10px] px-2 py-1 rounded-full uppercase font-bold">{link.category}</span>
                    </div>
                    <div className="p-4">
                        <h3 className="font-bold line-clamp-1">{link.title || link.url}</h3>
                        <p className="text-xs text-gray-500 mt-1 mb-3 line-clamp-2">{link.description || 'No description available.'}</p>
                        <a href={link.url} target="_blank" className="block text-center bg-primary text-white py-2 rounded-lg text-sm font-medium">Open Link</a>
                    </div>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [darkMode, setDarkMode] = useState(true);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [links, setLinks] = useLocalStorage('linkwave_links', []);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', darkMode);
                lucide.createIcons();
            }, [darkMode, isFormOpen, links]);

            const addLink = (newLink) => {
                const linkWithId = { ...newLink, id: Date.now(), timestamp: new Date().toISOString() };
                setLinks([linkWithId, ...links]);
            };

            return (
                <div className={`min-h-screen transition-colors ${darkMode ? 'bg-gray-950' : 'bg-gray-50'}`}>
                    <Header darkMode={darkMode} setDarkMode={setDarkMode} onMenuClick={() => setIsSidebarOpen(true)} />
                    
                    <main className="max-w-7xl mx-auto px-4 py-8">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-2xl font-bold dark:text-white">Recent Directory</h2>
                            <button onClick={() => setIsFormOpen(true)} className="bg-primary text-white px-4 py-2 rounded-lg flex items-center gap-2">
                                <i data-lucide="plus"></i> Add New
                            </button>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            {links.map(link => (
                                <LinkCard key={link.id} link={link} darkMode={darkMode} />
                            ))}
                        </div>
                    </main>

                    <AnimatePresence>
                        {isFormOpen && <SubmitForm darkMode={darkMode} onSubmit={addLink} onClose={() => setIsFormOpen(false)} />}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
