<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Wave - Submit a Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1121;
            color: #ffffff;
            min-height: 100vh;
        }

        .bg-card {
            background-color: #151c2f;
        }

        .input-field {
            background-color: #0b1121;
            border: 1px solid #2a3449;
            color: #fff;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .upload-area {
            border: 2px dashed #2a3449;
            transition: all 0.3s ease;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.05);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 100%);
            transition: opacity 0.3s ease, transform 0.2s ease;
        }

        .btn-gradient:hover {
            opacity: 0.9;
        }
        
        .btn-gradient:active {
            transform: scale(0.98);
        }

        select option {
            background-color: #151c2f;
            color: #fff;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b1121; 
        }
        ::-webkit-scrollbar-thumb {
            background: #2a3449; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6; 
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .community-card {
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar -->
    <nav class="border-b border-gray-800 bg-[#0b1121]/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <div class="bg-gradient-to-br from-blue-500 to-purple-600 p-2 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="font-bold text-xl tracking-wide">Link Wave</h1>
                        <p class="text-[10px] text-gray-400 tracking-widest uppercase mt-[-4px]">Connect • Share • Grow</p>
                    </div>
                </div>
                <div class="hidden md:flex items-center space-x-6">
                    <a href="#" class="text-sm text-gray-300 hover:text-white transition">Home</a>
                    <a href="#" class="text-sm text-gray-300 hover:text-white transition">Categories</a>
                    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full text-sm font-medium flex items-center transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Submit Link
                    </button>
                    <button class="text-gray-400 hover:text-yellow-400 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 mt-10">
        
        <!-- Form Header -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold mb-2">Submit a Link</h2>
            <p class="text-gray-400">Share your community with the world</p>
        </div>

        <!-- Form Container -->
        <div class="bg-card rounded-2xl p-6 sm:p-10 shadow-2xl border border-gray-800/50 mb-12">
            <form id="communityForm" class="space-y-6">
                
                <!-- Title -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Community Title <span class="text-red-500">*</span></label>
                    <input type="text" id="title" required placeholder="e.g., Tech Enthusiasts Hub" class="input-field w-full rounded-lg px-4 py-3 text-sm">
                </div>

                <!-- URL -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Link URL <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                            </svg>
                        </div>
                        <input type="url" id="url" required placeholder="https://chat.whatsapp.com/... or https://t.me/..." class="input-field w-full rounded-lg pl-10 pr-4 py-3 text-sm">
                    </div>
                </div>

                <!-- Cover Image Upload -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Cover Image <span class="text-red-500">*</span></label>
                    <div id="dropZone" class="upload-area rounded-xl p-8 text-center cursor-pointer relative overflow-hidden group">
                        <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        
                        <div id="uploadPlaceholder" class="flex flex-col items-center justify-center space-y-3">
                            <div class="bg-[#1e293b] p-3 rounded-full group-hover:bg-blue-600/20 transition-colors">
                                <svg class="h-6 w-6 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                </svg>
                            </div>
                            <div class="text-sm font-medium text-gray-200">Click to upload image</div>
                            <div class="text-xs text-gray-500">PNG, JPG up to 5MB</div>
                        </div>

                        <div id="imagePreviewContainer" class="hidden absolute inset-0 bg-black">
                            <img id="imagePreview" src="" alt="Preview" class="w-full h-full object-cover opacity-60">
                            <div class="absolute inset-0 flex flex-col items-center justify-center z-20">
                                <div class="bg-black/50 px-4 py-2 rounded-full text-white text-sm font-medium backdrop-blur-sm border border-white/20">
                                    Change Image
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Platform & Category -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Platform <span class="text-red-500">*</span></label>
                        <select id="platform" required class="input-field w-full rounded-lg px-4 py-3 text-sm appearance-none cursor-pointer">
                            <option value="" disabled selected>Select Platform</option>
                            <option value="WhatsApp">WhatsApp</option>
                            <option value="Telegram">Telegram</option>
                            <option value="Facebook">Facebook</option>
                            <option value="Discord">Discord</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Category <span class="text-red-500">*</span></label>
                        <select id="category" required class="input-field w-full rounded-lg px-4 py-3 text-sm appearance-none cursor-pointer">
                            <option value="" disabled selected>Select Category</option>
                            <option value="Movie">Movie</option>
                            <option value="Education">Education</option>
                            <option value="Jobs">Jobs</option>
                            <option value="Funny">Funny</option>
                            <option value="News">News</option>
                            <option value="Business">Business</option>
                            <option value="Tech">Tech</option>
                            <option value="Gaming">Gaming</option>
                            <option value="Crypto">Crypto</option>
                            <option value="Sports">Sports</option>
                            <option value="Music">Music</option>
                        </select>
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-gray-300">Description</label>
                        <span class="text-xs text-gray-500" id="wordCount">0/60 words</span>
                    </div>
                    <textarea id="description" rows="4" placeholder="Describe what makes your community special..." class="input-field w-full rounded-lg px-4 py-3 text-sm resize-none"></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="btn-gradient w-full py-4 rounded-xl text-white font-bold text-lg shadow-lg flex justify-center items-center mt-4">
                    <span id="btnText">Submit Community</span>
                    <svg id="btnIcon" class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Display Area for Submitted Communities -->
        <div class="mt-16">
            <h3 class="text-xl font-bold mb-6 flex items-center border-b border-gray-800 pb-4">
                <span class="bg-blue-500/20 text-blue-400 p-2 rounded-lg mr-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </span>
                Recently Added Communities
            </h3>
            
            <div id="communityList" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <!-- Data will populate here -->
            </div>
        </div>

    </main>

    <!-- Custom Notification Toast -->
    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 border border-gray-700 text-white px-6 py-3 rounded-full shadow-2xl transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center space-x-2">
        <svg class="w-5 h-5 text-green-400 hidden" id="toastSuccessIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <svg class="w-5 h-5 text-red-400 hidden" id="toastErrorIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        <span id="toastMsg" class="text-sm font-medium">Notification</span>
    </div>

    <!-- Firebase & Logic Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- CONFIGURATION ---
        const IMGBB_API_KEY = "e759f37759e5f253ed1d56997fdaa8b8"; // Oyalage ImgBB API Key eka
        
        // Meka Oyage Firebase Config ekata wenas karanna
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY", 
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // ---------------------

        // Safety check for environment variables (For platform testing)
        let actualConfig = firebaseConfig;
        if(typeof __firebase_config !== 'undefined') {
            try { actualConfig = JSON.parse(__firebase_config); } catch(e){}
        }
        
        const app = initializeApp(actualConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'link-wave-app';

        // DOM Elements
        const form = document.getElementById('communityForm');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const descriptionInput = document.getElementById('description');
        const wordCount = document.getElementById('wordCount');
        const communityList = document.getElementById('communityList');

        let selectedFile = null;

        // Word Count Logic
        descriptionInput.addEventListener('input', (e) => {
            const words = e.target.value.trim().split(/\s+/).filter(word => word.length > 0);
            wordCount.innerText = `${words.length}/60 words`;
            if (words.length > 60) {
                wordCount.classList.add('text-red-500');
            } else {
                wordCount.classList.remove('text-red-500');
            }
        });

        // Image Selection Logic
        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showToast("File size must be less than 5MB", "error");
                    fileInput.value = '';
                    return;
                }
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    uploadPlaceholder.classList.add('hidden');
                    imagePreviewContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        // Drag and Drop styling
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
            handleFileSelect({target: fileInput});
        }, false);


        // Form Submit Logic
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedFile) {
                showToast("Please select a cover image!", "error");
                return;
            }

            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            const platform = document.getElementById('platform').value;
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;

            // UI Loading state
            btnText.innerHTML = '<span class="loader"></span> Uploading...';
            btnIcon.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                // 1. Upload Image to ImgBB
                const formData = new FormData();
                formData.append('image', selectedFile);

                const imgbbResponse = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });

                const imgbbResult = await imgbbResponse.json();

                if (!imgbbResult.success) throw new Error("Image upload failed");

                const imageUrl = imgbbResult.data.url;

                // 2. Save Data to Firebase
                const dbPath = `artifacts/${appId}/public/data/links`;
                const newCommunityRef = ref(db, dbPath);
                
                await push(newCommunityRef, {
                    title: title,
                    url: url,
                    platform: platform,
                    category: category,
                    description: description,
                    imageUrl: imageUrl,
                    timestamp: Date.now()
                });

                // Success!
                showToast("Community submitted successfully!", "success");
                
                // Reset Form
                form.reset();
                selectedFile = null;
                uploadPlaceholder.classList.remove('hidden');
                imagePreviewContainer.classList.add('hidden');
                imagePreview.src = '';
                wordCount.innerText = "0/60 words";

            } catch (error) {
                console.error(error);
                showToast("An error occurred. Please try again.", "error");
            } finally {
                // Reset Button UI
                btnText.innerText = 'Submit Community';
                btnIcon.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });

        // Authenticate and Load Data
        signInAnonymously(auth).then(() => {
            loadCommunities();
        }).catch((error) => {
            console.error("Auth failed:", error);
        });

        // Function to Load Data to the Screen
        function loadCommunities() {
            const dbPath = `artifacts/${appId}/public/data/links`;
            const dataRef = ref(db, dbPath);
            
            onValue(dataRef, (snapshot) => {
                communityList.innerHTML = '';
                const data = snapshot.val();
                
                if (data) {
                    const items = Object.entries(data).reverse(); // Newest first
                    
                    items.forEach(([key, item], index) => {
                        // Badge Color based on platform
                        let badgeColor = 'bg-gray-600';
                        if(item.platform === 'WhatsApp') badgeColor = 'bg-green-600';
                        if(item.platform === 'Telegram') badgeColor = 'bg-blue-500';
                        if(item.platform === 'Facebook') badgeColor = 'bg-blue-700';
                        if(item.platform === 'Discord') badgeColor = 'bg-indigo-600';

                        const card = document.createElement('div');
                        // Add animation delay for list items
                        card.className = `bg-card border border-gray-800 rounded-xl overflow-hidden hover:border-blue-500/50 transition-colors community-card flex flex-col`;
                        card.style.animationDelay = `${index * 0.1}s`;
                        
                        card.innerHTML = `
                            <div class="h-32 w-full relative overflow-hidden bg-gray-900">
                                <img src="${item.imageUrl}" class="w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity" alt="${item.title}">
                                <div class="absolute top-3 left-3 flex gap-2">
                                    <span class="px-2 py-1 text-xs font-bold rounded shadow-lg text-white ${badgeColor}">${item.platform}</span>
                                    <span class="px-2 py-1 text-xs font-bold rounded shadow-lg bg-gray-800/80 backdrop-blur-sm text-gray-200 border border-gray-600">${item.category}</span>
                                </div>
                            </div>
                            <div class="p-5 flex-1 flex flex-col">
                                <h4 class="text-lg font-bold text-white mb-1 truncate">${item.title}</h4>
                                <p class="text-sm text-gray-400 line-clamp-2 mb-4 flex-1">${item.description || 'No description provided.'}</p>
                                <a href="${item.url}" target="_blank" class="block text-center w-full bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 border border-blue-500/20 py-2 rounded-lg text-sm font-semibold transition-colors">
                                    Join Community
                                </a>
                            </div>
                        `;
                        communityList.appendChild(card);
                    });
                } else {
                    communityList.innerHTML = `
                        <div class="col-span-full py-12 text-center text-gray-500 border border-dashed border-gray-800 rounded-xl">
                            <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            <p>No communities submitted yet. Be the first!</p>
                        </div>
                    `;
                }
            });
        }

        // Toast Notification System
        let toastTimeout;
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const successIcon = document.getElementById('toastSuccessIcon');
            const errorIcon = document.getElementById('toastErrorIcon');
            
            toastMsg.innerText = message;
            
            if(type === 'success') {
                successIcon.classList.remove('hidden');
                errorIcon.classList.add('hidden');
                toast.classList.add('border-green-500/50');
                toast.classList.remove('border-red-500/50');
            } else {
                successIcon.classList.add('hidden');
                errorIcon.classList.remove('hidden');
                toast.classList.remove('border-green-500/50');
                toast.classList.add('border-red-500/50');
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 4000);
        }

    </script>
</body>
        </html>
