<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiru ✘ Movie - Netflix Style</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">Hiru ✘ <span>Subz</span></div>
</header>

<!-- HERO BANNER -->
<section class="hero">
  <img src="https://via.placeholder.com/1200x500" alt="Featured Movie">
  <div class="hero-overlay">
    <h2>Featured Movie</h2>
    <p>Watch now with Sinhala Subtitles</p>
    <button>Watch Now</button>
  </div>
</section>

<!-- MOVIE CAROUSELS -->
<section class="movie-section">
  <h3>Trending Now</h3>
  <div class="movie-carousel" id="trendingCarousel"></div>
</section>

<section class="movie-section">
  <h3>New Releases</h3>
  <div class="movie-carousel" id="newCarousel"></div>
</section>

<script src="script.js"></script>
</body>
</html>
