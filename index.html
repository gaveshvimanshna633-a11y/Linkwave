<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Wave - Community Directory</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#8B0000',
                        primaryLight: '#A52A2A',
                        primaryDark: '#5C0000',
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        
        .animate-pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        // ==========================================
        // CONSTANTS & CONFIGURATION
        // ==========================================
        
        const COLORS = {
            primary: '#8B0000',
            primaryLight: '#A52A2A',
            primaryDark: '#5C0000',
        };
        
        const PLATFORMS = [
            { id: 'whatsapp', name: 'WhatsApp', icon: 'MessageCircle', color: '#25D366' },
            { id: 'telegram', name: 'Telegram', icon: 'Send', color: '#0088cc' },
            { id: 'facebook', name: 'Facebook', icon: 'Facebook', color: '#1877F2' },
            { id: 'discord', name: 'Discord', icon: 'MessageCircle', color: '#5865F2' },
            { id: 'website', name: 'Website', icon: 'Globe', color: '#8B0000' },
        ];
        
        const CATEGORIES = [
            { id: 'movies', name: 'Movies', icon: 'Film' },
            { id: 'tvseries', name: 'TV Series', icon: 'Tv' },
            { id: 'chat', name: 'Chat', icon: 'MessageCircle' },
            { id: 'education', name: 'Education', icon: 'GraduationCap' },
            { id: 'jobs', name: 'Jobs', icon: 'Briefcase' },
            { id: 'technology', name: 'Technology', icon: 'Cpu' },
            { id: 'marketplace', name: 'Selling/Marketplace', icon: 'ShoppingCart' },
            { id: 'gaming', name: 'Gaming', icon: 'Gamepad2' },
            { id: 'adult', name: '18+ Content', icon: 'AlertTriangle', restricted: true },
            { id: 'crypto', name: 'Crypto', icon: 'Bitcoin' },
        ];
        
        // ==========================================
        // MOCK DATA STORE (Simulates Firebase)
        // ==========================================
        
        const createMockStore = () => {
            let links = [
                {
                    id: '1',
                    title: 'Tech Talks Group',
                    url: 'https://chat.whatsapp.com/example',
                    platform: 'whatsapp',
                    category: 'technology',
                    description: 'Daily tech discussions and news sharing with developers worldwide',
                    thumbnail: 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400',
                    createdAt: Date.now(),
                    status: 'active',
                    clicks: 145,
                },
                {
                    id: '2',
                    title: 'Movie Buffs Central',
                    url: 'https://t.me/moviebuffs',
                    platform: 'telegram',
                    category: 'movies',
                    description: 'Latest movies and reviews discussion group',
                    thumbnail: 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400',
                    createdAt: Date.now() - 86400000,
                    status: 'active',
                    clicks: 89,
                },
                {
                    id: '3',
                    title: 'Crypto Traders Hub',
                    url: 'https://discord.gg/crypto',
                    platform: 'discord',
                    category: 'crypto',
                    description: 'Real-time crypto signals and market analysis',
                    thumbnail: 'https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=400',
                    createdAt: Date.now() - 172800000,
                    status: 'active',
                    clicks: 234,
                },
                {
                    id: '4',
                    title: 'Web Dev Jobs',
                    url: 'https://facebook.com/groups/webdevjobs',
                    platform: 'facebook',
                    category: 'jobs',
                    description: 'Remote web development job postings daily',
                    thumbnail: 'https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=400',
                    createdAt: Date.now() - 259200000,
                    status: 'active',
                    clicks: 567,
                },
                {
                    id: '5',
                    title: 'Gaming Squad',
                    url: 'https://discord.gg/gaming',
                    platform: 'discord',
                    category: 'gaming',
                    description: 'Find teammates for popular multiplayer games',
                    thumbnail: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400',
                    createdAt: Date.now() - 345600000,
                    status: 'active',
                    clicks: 1234,
                },
                {
                    id: '6',
                    title: 'Education Resources',
                    url: 'https://t.me/educationhub',
                    platform: 'telegram',
                    category: 'education',
                    description: 'Free courses and study materials shared daily',
                    thumbnail: 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=400',
                    createdAt: Date.now() - 432000000,
                    status: 'active',
                    clicks: 892,
                },
            ];
            
            let listeners = [];
            
            return {
                getLinks: () => links.filter(l => l.status === 'active'),
                addLink: (link) => {
                    const newLink = {
                        ...link,
                        id: Math.random().toString(36).substr(2, 9),
                        createdAt: Date.now(),
                        status: 'active',
                        clicks: 0,
                        thumbnail: link.thumbnail || `https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=400&random=${Math.random()}`,
                    };
                    links = [newLink, ...links];
                    listeners.forEach(cb => cb(links));
                    return newLink;
                },
                updateLink: (id, updates) => {
                    links = links.map(l => l.id === id ? { ...l, ...updates } : l);
                    listeners.forEach(cb => cb(links));
                },
                onLinksChange: (callback) => {
                    listeners.push(callback);
                    return () => {
                        listeners = listeners.filter(cb => cb !== callback);
                    };
                },
                checkLink: async (url) => {
                    return Math.random() > 0.1;
                }
            };
        };
        
        const mockStore = createMockStore();
        
        // ==========================================
        // ICON COMPONENTS (Lucide Wrapper)
        // ==========================================
        
        const Icon = ({ name, size = 24, className = "", color }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons({
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                            stroke: color || 'currentColor'
                        }
                    });
                }
            }, [name, size, className, color]);
            
            return <i data-lucide={name.toLowerCase()} ref={iconRef} className={className} style={{ width: size, height: size, color }} />;
        };
        
        // ==========================================
        // UI COMPONENTS
        // ==========================================
        
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);
            
            return (
                <motion.div
                    initial={{ opacity: 0, y: -50, x: '-50%' }}
                    animate={{ opacity: 1, y: 0, x: '-50%' }}
                    exit={{ opacity: 0, y: -50, x: '-50%' }}
                    className={`fixed top-4 left-1/2 z-[100] px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3 ${
                        type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600'
                    } text-white min-w-[300px] justify-center`}
                >
                    <Icon name={type === 'success' ? 'CheckCircle' : type === 'error' ? 'XCircle' : 'Info'} size={20} />
                    <span className="font-semibold">{message}</span>
                </motion.div>
            );
        };
        
        const Sidebar = ({ isOpen, onClose, currentView, setView, darkMode, setIsSubmitOpen }) => {
            const menuItems = [
                { id: 'home', label: 'Home', icon: 'Home' },
                { id: 'developer', label: 'Developer', icon: 'Code', external: true },
                { id: 'submit', label: 'Submit Link', icon: 'Plus', action: () => setIsSubmitOpen(true) },
            ];
            
            return (
                <>
                    <AnimatePresence>
                        {isOpen && (
                            <motion.div
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                onClick={onClose}
                                className="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 lg:hidden"
                            />
                        )}
                    </AnimatePresence>
                    
                    <motion.aside
                        initial={false}
                        animate={{ x: isOpen ? 0 : '-100%' }}
                        transition={{ type: 'spring', damping: 25, stiffness: 200 }}
                        className={`fixed left-0 top-0 h-full w-72 z-50 ${darkMode ? 'bg-gray-900' : 'bg-white'} shadow-2xl lg:translate-x-0 lg:static lg:h-screen border-r ${darkMode ? 'border-gray-800' : 'border-gray-200'}`}
                    >
                        <div className="p-6 h-full flex flex-col">
                            <div className="flex items-center justify-between mb-10">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-xl" style={{ backgroundColor: COLORS.primary }}>
                                        LW
                                    </div>
                                    <h1 className={`text-2xl font-bold ${darkMode ? 'text-white' : 'text-gray-900'}`}>
                                        Link <span style={{ color: COLORS.primary }}>Wave</span>
                                    </h1>
                                </div>
                                <button onClick={onClose} className="lg:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
                                    <Icon name="X" size={24} className={darkMode ? 'text-white' : 'text-gray-900'} />
                                </button>
                            </div>
                            
                            <nav className="space-y-2 flex-1">
                                {menuItems.map((item) => {
                                    const isActive = currentView === item.id && !item.external && !item.action;
                                    
                                    return (
                                        <button
                                            key={item.id}
                                            onClick={() => {
                                                if (item.action) item.action();
                                                else if (item.external) {
                                                    const devWindow = window.open('', '_blank');
                                                    devWindow.document.write(`
                                                        <!DOCTYPE html>
                                                        <html>
                                                        <head>
                                                            <title>Developer - Link Wave</title>
                                                            <script src="https://cdn.tailwindcss.com"><\/script>
                                                            <style>
                                                                @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
                                                                * { font-family: 'Inter', sans-serif; }
                                                            </style>
                                                        </head>
                                                        <body class="${darkMode ? 'bg-gray-900 text-white' : 'bg-gray-50 text-gray-900'} min-h-screen p-8">
                                                            <div class="max-w-4xl mx-auto">
                                                                <div class="h-48 bg-gradient-to-r from-red-900 to-red-700 rounded-2xl relative mb-20">
                                                                    <div class="absolute -bottom-16 left-8">
                                                                        <div class="w-32 h-32 rounded-full border-4 border-white dark:border-gray-900 bg-gray-300 flex items-center justify-center text-4xl">
                                                                            👨‍💻
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                                <div class="px-8">
                                                                    <h1 class="text-4xl font-bold mb-2">Full Stack Developer</h1>
                                                                    <p class="text-xl text-red-700 mb-6">Building the future of web applications</p>
                                                                    <p class="text-lg mb-8 opacity-80">Passionate about creating intuitive, scalable, and performant web applications. Specialized in React, Node.js, and modern cloud architectures.</p>
                                                                    <div class="flex flex-wrap gap-3 mb-8">
                                                                        ${['React', 'TypeScript', 'Node.js', 'Firebase', 'Tailwind'].map(skill => 
                                                                            `<span class="px-4 py-2 rounded-full bg-gray-200 dark:bg-gray-800 font-medium">${skill}</span>`
                                                                        ).join('')}
                                                                    </div>
                                                                    <div class="border-t dark:border-gray-700 pt-8">
                                                                        <h3 class="font-bold text-xl mb-4">Connect</h3>
                                                                        <div class="flex gap-4">
                                                                            <a href="#" class="px-6 py-3 rounded-lg bg-gray-200 dark:bg-gray-800 hover:bg-red-100 dark:hover:bg-red-900/30 transition-colors font-medium">GitHub</a>
                                                                            <a href="#" class="px-6 py-3 rounded-lg bg-gray-200 dark:bg-gray-800 hover:bg-red-100 dark:hover:bg-red-900/30 transition-colors font-medium">Twitter</a>
                                                                            <a href="#" class="px-6 py-3 rounded-lg bg-gray-200 dark:bg-gray-800 hover:bg-red-100 dark:hover:bg-red-900/30 transition-colors font-medium">LinkedIn</a>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </body>
                                                        </html>
                                                    `);
                                                }
                                                else setView(item.id);
                                                onClose();
                                            }}
                                            className={`w-full flex items-center gap-4 px-4 py-4 rounded-xl transition-all duration-200 ${
                                                isActive 
                                                    ? 'text-white shadow-lg' 
                                                    : darkMode ? 'text-gray-300 hover:bg-gray-800' : 'text-gray-600 hover:bg-gray-100'
                                            }`}
                                            style={{ backgroundColor: isActive ? COLORS.primary : 'transparent' }}
                                        >
                                            <Icon name={item.icon} size={22} />
                                            <span className="font-semibold text-lg">{item.label}</span>
                                            {item.external && <Icon name="ExternalLink" size={16} className="ml-auto opacity-50" />}
                                        </button>
                                    );
                                })}
                            </nav>
                            
                            <div className={`pt-6 border-t ${darkMode ? 'border-gray-800' : 'border-gray-200'}`}>
                                <p className={`text-sm ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                                    © 2026 Link Wave<br/>
                                    <span className="text-xs">Open Source Directory</span>
                                </p>
                            </div>
                        </div>
                    </motion.aside>
                </>
            );
        };
        
        const Hero = ({ darkMode }) => {
            return (
                <section className={`relative overflow-hidden py-24 px-4 sm:px-6 lg:px-8 ${darkMode ? 'bg-gray-900' : 'bg-gradient-to-br from-red-50 via-white to-red-50'}`}>
                    <motion.div
                        animate={{ 
                            scale: [1, 1.3, 1],
                            rotate: [0, 90, 180, 270, 360],
                        }}
                        transition={{ duration: 20, repeat: Infinity, ease: "linear" }}
                        className="absolute top-0 right-0 w-[500px] h-[500px] opacity-10"
                        style={{ 
                            background: `radial-gradient(circle, ${COLORS.primary} 0%, transparent 70%)`,
                            filter: 'blur(60px)'
                        }}
                    />
                    <motion.div
                        animate={{ 
                            scale: [1, 1.2, 1],
                            x: [0, 50, 0],
                        }}
                        transition={{ duration: 15, repeat: Infinity, ease: "easeInOut" }}
                        className="absolute bottom-0 left-0 w-[400px] h-[400px] opacity-5"
                        style={{ 
                            background: `radial-gradient(circle, ${COLORS.primary} 0%, transparent 70%)`,
                            filter: 'blur(40px)'
                        }}
                    />
                    
                    <div className="relative max-w-5xl mx-auto text-center">
                        <motion.div
                            initial={{ scale: 0.8, opacity: 0 }}
                            animate={{ scale: 1, opacity: 1 }}
                            transition={{ duration: 0.5 }}
                            className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm shadow-sm mb-8 border border-red-100 dark:border-gray-700"
                        >
                            <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                            <span className={`text-sm font-medium ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>Live Directory • {new Date().toLocaleDateString()}</span>
                        </motion.div>
                        
                        <motion.h1
                            initial={{ y: 30, opacity: 0 }}
                            animate={{ y: 0, opacity: 1 }}
                            transition={{ delay: 0.2, duration: 0.6 }}
                            className={`text-6xl sm:text-7xl lg:text-8xl font-extrabold mb-6 tracking-tight ${darkMode ? 'text-white' : 'text-gray-900'}`}
                        >
                            Link <span className="text-transparent bg-clip-text bg-gradient-to-r from-red-900 to-red-600">Wave</span>
                        </motion.h1>
                        
                        <motion.p
                            initial={{ y: 30, opacity: 0 }}
                            animate={{ y: 0, opacity: 1 }}
                            transition={{ delay: 0.4, duration: 0.6 }}
                            className={`text-xl sm:text-2xl mb-10 max-w-2xl mx-auto leading-relaxed ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}
                        >
                            Your Gateway to Curated Communities & Resources.
                            <span className="block mt-2 text-lg opacity-80">No login required. Submit instantly.</span>
                        </motion.p>
                        
                        <motion.div
                            initial={{ y: 30, opacity: 0 }}
                            animate={{ y: 0, opacity: 1 }}
                            transition={{ delay: 0.6, duration: 0.6 }}
                            className="flex flex-wrap justify-center gap-4"
                        >
                            <div className={`px-6 py-3 rounded-full shadow-lg flex items-center gap-3 ${darkMode ? 'bg-gray-800 text-white' : 'bg-white text-gray-700'}`}>
                                <Icon name="Zap" size={18} className="text-yellow-500" />
                                <span className="font-medium">Real-time Updates</span>
                            </div>
                            <div className={`px-6 py-3 rounded-full shadow-lg flex items-center gap-3 ${darkMode ? 'bg-gray-800 text-white' : 'bg-white text-gray-700'}`}>
                                <Icon name="Shield" size={18} className="text-green-500" />
                                <span className="font-medium">Auto Link Check</span>
                            </div>
                            <div className={`px-6 py-3 rounded-full shadow-lg flex items-center gap-3 ${darkMode ? 'bg-gray-800 text-white' : 'bg-white text-gray-700'}`}>
                                <Icon name="Smartphone" size={18} className="text-blue-500" />
                                <span className="font-medium">Mobile Optimized</span>
                            </div>
                        </motion.div>
                    </div>
                </section>
            );
        };
        
        const CategoryFilter = ({ selectedPlatform, setSelectedPlatform, selectedCategory, setSelectedCategory, darkMode, searchQuery, setSearchQuery }) => {
            return (
                <div className={`sticky top-16 z-30 ${darkMode ? 'bg-gray-900/95' : 'bg-white/95'} glass-effect border-b ${darkMode ? 'border-gray-800' : 'border-gray-200'} py-4`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex flex-col lg:flex-row gap-4 items-start lg:items-center justify-between">
                            <div className="flex items-center gap-3 w-full lg:w-auto">
                                <div className={`p-2 rounded-lg ${darkMode ? 'bg-gray-800' : 'bg-gray-100'}`}>
                                    <Icon name="Filter" size={20} color={COLORS.primary} />
                                </div>
                                <span className={`font-bold text-lg ${darkMode ? 'text-white' : 'text-gray-900'}`}>Filters</span>
                            </div>
                            
                            <div className="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                                {/* Search */}
                                <div className={`relative flex-1 sm:flex-none ${darkMode ? 'bg-gray-800' : 'bg-gray-100'} rounded-lg flex items-center px-3 py-2`}>
                                    <Icon name="Search" size={18} className={darkMode ? 'text-gray-400' : 'text-gray-500'} />
                                    <input
                                        type="text"
                                        placeholder="Search links..."
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className={`bg-transparent border-none outline-none ml-2 w-full sm:w-48 ${darkMode ? 'text-white placeholder-gray-500' : 'text-gray-900 placeholder-gray-500'}`}
                                    />
                                </div>
                                
                                {/* Platform Select */}
                                <div className="relative">
                                    <select
                                        value={selectedPlatform}
                                        onChange={(e) => {
                                            setSelectedPlatform(e.target.value);
                                            setSelectedCategory('');
                                        }}
                                        className={`appearance-none px-4 py-2.5 pr-12 rounded-lg border-2 font-medium cursor-pointer transition-all ${darkMode ? 'bg-gray-800 border-gray-700 text-white hover:border-gray-600' : 'bg-white border-gray-200 text-gray-900 hover:border-gray-300'} focus:outline-none focus:border-red-900`}
                                    >
                                        <option value="">All Platforms</option>
                                        {PLATFORMS.map(p => (
                                            <option key={p.id} value={p.id}>{p.name}</option>
                                        ))}
                                    </select>
                                    <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none">
                                        <Icon name="ChevronDown" size={18} className="text-gray-400" />
                                    </div>
                                </div>
                                
                                {/* Category Select */}
                                <div className="relative">
                                    <select
                                        value={selectedCategory}
                                        onChange={(e) => setSelectedCategory(e.target.value)}
                                        disabled={!selectedPlatform}
                                        className={`appearance-none px-4 py-2.5 pr-12 rounded-lg border-2 font-medium cursor-pointer transition-all ${darkMode ? 'bg-gray-800 border-gray-700 text-white hover:border-gray-600' : 'bg-white border-gray-200 text-gray-900 hover:border-gray-300'} focus:outline-none focus:border-red-900 disabled:opacity-50 disabled:cursor-not-allowed`}
                                    >
                                        <option value="">All Categories</option>
                                        {CATEGORIES.map(c => (
                                            <option key={c.id} value={c.id}>{c.name}</option>
                                        ))}
                                    </select>
                                    <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none">
                                        <Icon name="ChevronDown" size={18} className="text-gray-400" />
                                    </div>
                                </div>
                                
                                {(selectedPlatform || selectedCategory || searchQuery) && (
                                    <button
                                        onClick={() => {
                                            setSelectedPlatform('');
                                            setSelectedCategory('');
                                            setSearchQuery('');
                                        }}
                                        className="px-4 py-2.5 rounded-lg font-medium text-red-700 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors flex items-center gap-2"
                                    >
                                        <Icon name="X" size={18} />
                                        Clear
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        const LinkCard = ({ link, darkMode, onShare }) => {
            const platform = PLATFORMS.find(p => p.id === link.platform);
            const category = CATEGORIES.find(c => c.id === link.category);
            
            const handleClick = () => {
                mockStore.updateLink(link.id, { clicks: (link.clicks || 0) + 1 });
                window.open(link.url, '_blank', 'noopener,noreferrer');

                                    </div>
                                    <p className="text-xl font-semibold mb-2">No links found</p>
                                    <p className="mb-6">Try adjusting your filters or search query</p>
                                    <button
                                        onClick={() => {
                                            setSelectedPlatform('');
                                            setSelectedCategory('');
                                            setSearchQuery('');
                                        }}
                                        className="px-6 py-3 rounded-xl text-white font-semibold transition-opacity hover:opacity-90"
                                        style={{ backgroundColor: COLORS.primary }}
                                    >
                                        Clear All Filters
                                    </button>
                                </motion.div>
                            ) : (
                                <motion.div 
                                    layout
                                    className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
                                >
                                    <AnimatePresence mode="popLayout">
                                        {filteredLinks.map((link) => (
                                            <LinkCard 
                                                key={link.id} 
                                                link={link} 
                                                darkMode={darkMode}
                                                onShare={setShareLink}
                                            />
                                        ))}
                                    </AnimatePresence>
                                </motion.div>
                            )}
                        </div>
                    </main>
                    
                    {/* Submit Modal */}
                    <AnimatePresence>
                        {isSubmitOpen && (
                            <SubmitModal 
                                isOpen={isSubmitOpen}
                                onClose={() => setIsSubmitOpen(false)}
                                darkMode={darkMode}
                                onSubmit={handleSubmit}
                            />
                        )}
                    </AnimatePresence>
                    
                    {/* Share Modal */}
                    <AnimatePresence>
                        {shareLink && (
                            <ShareModal
                                link={shareLink}
                                isOpen={!!shareLink}
                                onClose={() => setShareLink(null)}
                                darkMode={darkMode}
                            />
                        )}
                    </AnimatePresence>
                    
                    {/* Mobile FAB */}
                    <motion.button
                        initial={{ scale: 0 }}
                        animate={{ scale: 1 }}
                        whileHover={{ scale: 1.1 }}
                        whileTap={{ scale: 0.9 }}
                        onClick={() => setIsSubmitOpen(true)}
                        className="sm:hidden fixed bottom-6 right-6 w-16 h-16 rounded-full text-white shadow-2xl flex items-center justify-center z-30"
                        style={{ backgroundColor: COLORS.primary }}
                    >
                        <Icon name="Plus" size={28} />
                    </motion.button>
                </div>
            );
        };
        
        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
  </html>
