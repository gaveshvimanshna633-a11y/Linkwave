<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STREAM X PLAYER</title>

<!-- VIDEO JS -->
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
overflow:hidden;
}

/* PLAYER WRAPPER */
.player-wrapper{
width:100%;
max-width:1000px;
position:relative;
}

/* PLAYER */
.video-js{
width:100%;
height:auto;
border-radius:18px;
overflow:hidden;
background:black;
box-shadow:0 0 40px rgba(255,0,0,.3);
}

/* TOP TITLE */
.movie-title{
position:absolute;
top:15px;
left:20px;
z-index:999;
color:white;
font-size:20px;
font-weight:bold;
text-shadow:0 0 10px black;
}

/* LOGO */
.logo{
position:absolute;
top:15px;
right:15px;
z-index:999;
background:rgba(0,0,0,.6);
padding:8px 12px;
border-radius:10px;
font-weight:bold;
color:white;
font-size:14px;
backdrop-filter:blur(10px);
}

.logo span{
background:red;
padding:2px 6px;
border-radius:5px;
}

/* CONTROL BAR */
.vjs-control-bar{
background:linear-gradient(to top,
rgba(0,0,0,.95),
rgba(0,0,0,.2))!important;

backdrop-filter:blur(10px);
height:55px!important;
}

/* PROGRESS BAR */
.vjs-play-progress{
background:#ff0000!important;
}

.vjs-volume-level{
background:#ff0000!important;
}

/* BIG PLAY BUTTON */
.vjs-big-play-button{
background:#008cff!important;
border:none!important;
width:90px!important;
height:90px!important;
line-height:90px!important;
border-radius:50%!important;
top:50%!important;
left:50%!important;
transform:translate(-50%,-50%)!important;
font-size:45px!important;
box-shadow:0 0 30px rgba(0,140,255,.8);
}

/* BUTTON COLORS */
.vjs-control{
color:white!important;
}

/* SETTINGS MENU */
.vjs-menu-content{
background:#111!important;
border-radius:10px;
}

/* SUBTITLE STYLE */
.video-js .vjs-text-track-display{
font-size:22px;
font-weight:bold;
text-shadow:2px 2px 6px black;
}

/* SUBTITLE BUTTON */
.subtitle-btn{
position:fixed;
bottom:20px;
right:20px;
z-index:9999;
background:red;
color:white;
border:none;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px rgba(255,0,0,.5);
}

/* MOBILE */
@media(max-width:768px){

.vjs-big-play-button{
width:70px!important;
height:70px!important;
line-height:70px!important;
font-size:35px!important;
}

.movie-title{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="player-wrapper">

<!-- MOVIE TITLE -->
<div class="movie-title">
Raayan (2024)
</div>

<!-- LOGO -->
<div class="logo">
STREAM <span>X</span>
</div>

<!-- PLAYER -->
<video
id="streamx-player"
class="video-js vjs-big-play-centered"
controls
preload="auto"
poster="https://image.tmdb.org/t/p/original/8cdWjvZQUExUUTzyp4t6EDMubfO.jpg"
data-setup='{}'
>

<!-- VIDEO SOURCE -->
<source
src="https://dhruvmirrorpremium1-a2c47cf17a7f.herokuapp.com/59426/_Daredevil_Born_Again_2026_S02_EP%C2%A004%C2%A0TRUE_WEB_DL_4K_SDR_.mkv?hash=AgADjB"
type="video/mp4">

<!-- SUBTITLE -->
<track
kind="subtitles"
label="Sinhala"
srclang="si"
src="subtitles.vtt"
default>

</video>

</div>

<!-- SUBTITLE BUTTON -->
<button class="subtitle-btn" id="uploadSubtitle">
CC Upload
</button>

<!-- VIDEO JS -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>

/* PLAYER INIT */
const player = videojs('streamx-player', {

fluid:true,
responsive:true,

playbackRates:[0.5,1,1.5,2],

controlBar:{
volumePanel:true,
fullscreenToggle:true,
pictureInPictureToggle:true
}

});

/* AUTOPLAY */
player.ready(function(){
player.play();
});

/* DOUBLE TAP SEEK */
let lastTap = 0;

player.el().addEventListener('touchend', function(e){

const currentTime = new Date().getTime();
const tapLength = currentTime - lastTap;

if(tapLength < 300 && tapLength > 0){

const x = e.changedTouches[0].clientX;
const width = window.innerWidth;

if(x < width / 2){
player.currentTime(player.currentTime() - 10);
}else{
player.currentTime(player.currentTime() + 10);
}

}

lastTap = currentTime;

});

/* KEYBOARD SHORTCUTS */
document.addEventListener('keydown', (e)=>{

if(e.key === 'f'){
player.requestFullscreen();
}

if(e.key === 'ArrowRight'){
player.currentTime(player.currentTime()+10);
}

if(e.key === 'ArrowLeft'){
player.currentTime(player.currentTime()-10);
}

if(e.key === ' '){

if(player.paused()){
player.play();
}else{
player.pause();
}

}

});

/* SUBTITLE UPLOAD */
const input = document.createElement('input');

input.type = 'file';
input.accept = '.vtt,.srt';
input.style.display = 'none';

document.body.appendChild(input);

document.getElementById('uploadSubtitle').onclick = ()=>{
input.click();
};

input.onchange = ()=>{

const file = input.files[0];

if(!file) return;

const url = URL.createObjectURL(file);

const track = document.createElement('track');

track.kind = 'subtitles';
track.label = 'Uploaded Subtitle';
track.srclang = 'si';
track.src = url;
track.default = true;

player.el().querySelector('video').appendChild(track);

alert('Subtitle Loaded');

};

/* SAVE WATCH TIME */
player.on('timeupdate', ()=>{

localStorage.setItem(
'streamx-time',
player.currentTime()
);

});

/* RESUME WATCH */
player.ready(()=>{

const savedTime =
localStorage.getItem('streamx-time');

if(savedTime){
player.currentTime(savedTime);
}

});

</script>

</body>
</html>
