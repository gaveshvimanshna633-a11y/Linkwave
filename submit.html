<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Link</title>

<style>

body{
background:#050508;
font-family:Arial;
color:white;
text-align:center;
}

form{
display:flex;
flex-direction:column;
gap:10px;
width:300px;
margin:40px auto;
background:#111;
padding:20px;
border-radius:10px;
}

input,select,textarea{
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
background:#3a7bfd;
border:none;
color:white;
border-radius:20px;
}

</style>

</head>

<body>

<h1>Submit Link</h1>

<form id="linkForm">

<input id="name" placeholder="Group Name" required>

<select id="platform">
<option>WhatsApp</option>
<option>Telegram</option>
<option>Facebook</option>
</select>

<input id="category" placeholder="Category">

<input id="url" placeholder="Group URL" required>

<input id="logo" placeholder="Logo URL">

<textarea id="description" placeholder="Description"></textarea>

<button type="submit">Submit</button>

</form>

<p id="status"></p>

<script>

const repoOwner="gaveshvimanshana25-blip"
const repoName="Gaveshmy"
const filePath="links.json"

const githubToken="YOUR_TOKEN_HERE"

document.getElementById("linkForm").addEventListener("submit",async e=>{

e.preventDefault()

const newLink={
name:document.getElementById("name").value,
platform:document.getElementById("platform").value,
category:document.getElementById("category").value,
url:document.getElementById("url").value,
logo:document.getElementById("logo").value,
description:document.getElementById("description").value
}

try{

const res=await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`)

const data=await res.json()

const sha=data.sha

const content=JSON.parse(atob(data.content))

content.push(newLink)

const update=await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`,{

method:"PUT",

headers:{
Authorization:`token ${githubToken}`,
"Content-Type":"application/json"
},

body:JSON.stringify({
message:"Add new link",
content:btoa(JSON.stringify(content,null,2)),
sha:sha
})

})

if(update.ok){

document.getElementById("status").innerText="Link Submitted!"

}else{

document.getElementById("status").innerText="Error submitting"

}

}catch(err){

document.getElementById("status").innerText="Error"

}

})

</script>

</body>
</html>
